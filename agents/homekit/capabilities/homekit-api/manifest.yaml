id: homekit-api
class: tool
image: pap-cap-homekit-api:latest

tools:
  - name: list_homes
    description: >
      List all HomeKit homes and their basic info (name, room count,
      accessory count, scene count). Use this first to get home IDs.
    input_schema:
      type: object
      properties: {}
      required: []

  - name: list_accessories
    description: >
      List all accessories in a specific home, including their current state,
      room assignment, and available characteristics.
    input_schema:
      type: object
      properties:
        home_id:
          type: string
          description: "UUID of the home (from list_homes)"
      required: [home_id]

  - name: list_rooms
    description: >
      List all rooms in a specific home.
    input_schema:
      type: object
      properties:
        home_id:
          type: string
          description: "UUID of the home (from list_homes)"
      required: [home_id]

  - name: set_characteristic
    description: >
      Set a characteristic value on a specific accessory. For example, turn a
      light on/off, adjust brightness, set thermostat target temperature, or
      lock/unlock a door.
    input_schema:
      type: object
      properties:
        home_id:
          type: string
          description: "UUID of the home"
        accessory_id:
          type: string
          description: "UUID of the accessory (from list_accessories)"
        characteristic:
          type: string
          description: >
            Name or type of the characteristic to set (e.g. "Power State",
            "Brightness", "Target Temperature", "Lock Target State")
        value:
          description: >
            The value to set. Type depends on the characteristic:
            boolean for on/off, integer for brightness (0-100), float for
            temperature, etc.
      required: [home_id, accessory_id, characteristic, value]

  - name: list_scenes
    description: >
      List all available scenes (action sets) in a specific home.
    input_schema:
      type: object
      properties:
        home_id:
          type: string
          description: "UUID of the home (from list_homes)"
      required: [home_id]

  - name: execute_scene
    description: >
      Execute a scene (action set) by its ID. Scenes trigger predefined
      actions on multiple accessories at once.
    input_schema:
      type: object
      properties:
        home_id:
          type: string
          description: "UUID of the home"
        scene_id:
          type: string
          description: "UUID of the scene (from list_scenes)"
      required: [home_id, scene_id]

network:
  mode: allowlist
  hosts:
    - "127.0.0.1:18089"

filesystem: temp

credentials: []

resources:
  max_memory_mb: 64
  max_cpu_fraction: 0.25
  max_cpu_seconds: 15
  pids_limit: 32
