<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAP — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-dvh flex items-center justify-center antialiased">
  <div class="w-full max-w-sm mx-4">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-brand-600 mb-4">
        <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-white">Welcome back</h1>
      <p class="text-sm text-slate-400 mt-1">Sign in to your PAP instance</p>
    </div>

    <!-- Error -->
    {% if let Some(err) = error %}
    <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center">
      {{ err }}
    </div>
    {% endif %}

    <!-- Form -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label for="username" class="block text-xs font-medium text-slate-400 mb-1.5">Username</label>
          <input type="text" id="username" name="username" required autofocus
                 placeholder="Enter username"
                 class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition" />
        </div>
        <div>
          <label for="password" class="block text-xs font-medium text-slate-400 mb-1.5">Password</label>
          <input type="password" id="password" name="password" required
                 placeholder="Enter password"
                 class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition" />
        </div>
        <button type="submit"
                class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium text-sm py-2.5 rounded-lg transition-colors cursor-pointer">
          Sign in
        </button>
      </form>
    </div>
  </div>
</body>
</html>
