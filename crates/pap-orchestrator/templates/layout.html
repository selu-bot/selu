<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAP — {% block title %}Personal Agent Platform{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface-2: #21253a;
      --border:    #2a2d3a;
      --accent:    #6c63ff;
      --accent-d:  #5a52d5;
      --danger:    #ef4444;
      --danger-d:  #dc2626;
      --success:   #22c55e;
      --text:      #e2e8f0;
      --muted:     #718096;
      --user-bg:   #2d3748;
      --asst-bg:   #1e293b;
      --radius:    10px;
      --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0 1rem;
      height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    nav .logo {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
      margin-right: 0.75rem;
      letter-spacing: -0.02em;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    nav a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    nav a.active { color: var(--text); background: rgba(108,99,255,0.15); }
    nav a.nav-advanced { font-size: 0.75rem; opacity: 0.5; }
    nav a.nav-advanced:hover { opacity: 0.8; }
    nav a.nav-advanced.active { opacity: 1; }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar (chat) ── */
    .sidebar {
      width: 240px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 0.875rem 1rem 0.5rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .pipe-item {
      padding: 0.55rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 1px;
      text-decoration: none;
      color: var(--text);
    }
    .pipe-item:hover { background: rgba(108,99,255,0.07); }
    .pipe-item.active { border-left-color: var(--accent); background: rgba(108,99,255,0.12); }
    .pipe-item .pipe-name { font-size: 0.875rem; font-weight: 500; }
    .pipe-item .pipe-meta { font-size: 0.75rem; color: var(--muted); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 0.875rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
      background: var(--surface);
    }
    .chat-header .pipe-title { font-weight: 600; }
    .chat-header .pipe-subtitle { font-size: 0.8rem; color: var(--muted); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }
    .message {
      max-width: 76%;
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      background: var(--user-bg);
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }
    .message.assistant {
      background: var(--asst-bg);
      align-self: flex-start;
      border-bottom-left-radius: 3px;
      border: 1px solid var(--border);
    }
    .message.status {
      background: none;
      align-self: flex-start;
      color: var(--muted);
      font-size: 0.8rem;
      font-style: italic;
      padding: 0.2rem 0;
      max-width: 100%;
    }
    .message .meta { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }
    .streaming::after {
      content: "▋";
      animation: blink 1s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    .input-bar {
      padding: 0.875rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-bar form { display: flex; gap: 0.75rem; align-items: flex-end; }
    .input-bar textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.6rem 0.875rem;
      font-family: var(--font);
      font-size: 0.9rem;
      resize: none;
      max-height: 160px;
      min-height: 42px;
      line-height: 1.5;
    }
    .input-bar textarea:focus { outline: none; border-color: var(--accent); }
    .input-bar textarea::placeholder { color: var(--muted); }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--muted);
    }
    .empty-state .big { font-size: 2.5rem; }

    /* ── Management pages ── */
    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 960px;
      width: 100%;
    }
    .page-header { display: flex; flex-direction: column; gap: 0.25rem; }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; }
    .page-header p { font-size: 0.875rem; color: var(--muted); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    thead th {
      padding: 0.65rem 1.25rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody td {
      padding: 0.7rem 1.25rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    td.mono { font-family: "SF Mono", "Fira Code", monospace; font-size: 0.8rem; color: var(--muted); }
    td.actions { text-align: right; white-space: nowrap; }

    .empty-row td {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-style: italic;
    }

    /* Forms */
    .form-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.875rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 0.55rem 0.75rem;
      font-family: var(--font);
      font-size: 0.875rem;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--muted); }
    .form-group select option { background: var(--surface); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }
    .form-footer { display: flex; justify-content: flex-end; padding-top: 0.25rem; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 7px;
      border: none;
      font-family: var(--font);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, opacity 0.15s;
      line-height: 1;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-d); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 600;
      line-height: 1;
    }
    .badge-green { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-red { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-blue { background: rgba(108,99,255,0.2); color: #a5b4fc; }
    .badge-gray { background: rgba(113,128,150,0.15); color: var(--muted); }

    /* Flash / Alert */
    .flash {
      padding: 0.875rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .flash-success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }
    .flash-info {
      background: rgba(108,99,255,0.1);
      border: 1px solid rgba(108,99,255,0.35);
      color: #c4b5fd;
    }
    .flash strong { font-weight: 700; }
    .flash code {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.8rem;
      background: rgba(0,0,0,0.25);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      word-break: break-all;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Integration cards */
    .integration-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .integration-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .integration-card:hover { border-color: var(--accent); }
    .integration-card .ic-header { display: flex; align-items: center; gap: 0.75rem; }
    .integration-card .ic-icon { font-size: 1.75rem; width: 2.5rem; text-align: center; }
    .integration-card .ic-title { font-weight: 600; font-size: 1rem; }
    .integration-card .ic-desc { font-size: 0.825rem; color: var(--muted); line-height: 1.5; }
    .integration-card .ic-status { font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }

    /* Wizard steps */
    .wizard-steps { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .wizard-step {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; color: var(--muted);
      padding: 0.4rem 0.75rem; border-radius: 99px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }
    .wizard-step.active { color: var(--text); background: rgba(108,99,255,0.15); border-color: var(--accent); }
    .wizard-step.done { color: var(--success); border-color: rgba(34,197,94,0.3); }
    .wizard-step .step-num {
      width: 1.4rem; height: 1.4rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 0.7rem; font-weight: 700;
      background: var(--border); color: var(--muted);
    }
    .wizard-step.active .step-num { background: var(--accent); color: #fff; }
    .wizard-step.done .step-num { background: rgba(34,197,94,0.2); color: var(--success); }

    /* Person rows (for adding allowed senders) */
    .person-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .person-row:last-child { border-bottom: none; }
    .person-row .person-info { flex: 1; }
    .person-row .person-name { font-weight: 500; font-size: 0.875rem; }
    .person-row .person-phone { font-size: 0.8rem; color: var(--muted); font-family: "SF Mono","Fira Code",monospace; }
    .person-avatar {
      width: 2rem; height: 2rem;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #fff;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="logo">PAP</span>
    <a href="/chat"          class="{% if active_nav == "chat" %}active{% endif %}">Chat</a>
    <a href="/integrations"  class="{% if active_nav == "integrations" %}active{% endif %}">Integrations</a>
    <a href="/agents"        class="{% if active_nav == "agents" %}active{% endif %}">Agents</a>
    <a href="/providers"     class="{% if active_nav == "providers" %}active{% endif %}">Providers</a>
    <a href="/users"         class="{% if active_nav == "users" %}active{% endif %}">Users</a>
    <a href="/credentials"   class="nav-advanced {% if active_nav == "credentials" %}active{% endif %}">Credentials</a>
    <a href="/pipes"         class="nav-advanced {% if active_nav == "pipes" %}active{% endif %}">Pipes</a>
    <a href="/subscriptions" class="nav-advanced {% if active_nav == "subscriptions" %}active{% endif %}">Events</a>
    <span style="flex:1"></span>
    <form method="POST" action="/logout" style="margin:0">
      <button type="submit" class="btn btn-ghost btn-sm" style="border:none;color:var(--muted);font-size:0.8rem;cursor:pointer">Logout</button>
    </form>
  </nav>
  <div class="layout">
    {% block body %}{% endblock %}
  </div>
  <script>
    // Auto-resize textarea
    document.addEventListener('input', e => {
      if (e.target.tagName === 'TEXTAREA') {
        e.target.style.height = 'auto';
        e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
      }
    });
    // Submit textarea on Enter (Shift+Enter = newline)
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'TEXTAREA' && e.dataset.submit === 'enter'
          && e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        e.target.closest('form')?.requestSubmit();
      }
    });
  </script>
</body>
</html>
