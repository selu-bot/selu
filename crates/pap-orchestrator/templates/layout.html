<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAP — {% block title %}Personal Agent Platform{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              300: '#a5b4fc',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81',
            }
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"SF Mono"', '"Fira Code"', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Minimal custom styles for things Tailwind CDN can't easily do */
    @keyframes blink { 50% { opacity: 0; } }
    .streaming::after {
      content: "\25CB";
      animation: blink 1s step-end infinite;
      color: #818cf8;
      margin-left: 2px;
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    /* HTMX loading indicator */
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }

    /* ── Markdown prose inside chat bubbles ─────────────────────── */
    .markdown-body { line-height: 1.65; word-wrap: break-word; }
    .markdown-body p { margin: 0.4em 0; }
    .markdown-body p:first-child { margin-top: 0; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body strong { color: #e2e8f0; font-weight: 600; }
    .markdown-body em { color: #cbd5e1; }
    .markdown-body ul, .markdown-body ol { margin: 0.4em 0; padding-left: 1.5em; }
    .markdown-body li { margin: 0.15em 0; }
    .markdown-body li::marker { color: #64748b; }
    .markdown-body code {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 0.15em 0.35em;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85em;
      color: #e2e8f0;
    }
    .markdown-body pre {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 0.85em 1em;
      margin: 0.5em 0;
      overflow-x: auto;
    }
    .markdown-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.82em;
      color: #cbd5e1;
    }
    .markdown-body blockquote {
      border-left: 3px solid #4f46e5;
      padding-left: 0.8em;
      margin: 0.5em 0;
      color: #94a3b8;
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3,
    .markdown-body h4, .markdown-body h5, .markdown-body h6 {
      color: #f1f5f9;
      font-weight: 600;
      margin: 0.6em 0 0.3em;
    }
    .markdown-body h1 { font-size: 1.3em; }
    .markdown-body h2 { font-size: 1.15em; }
    .markdown-body h3 { font-size: 1.05em; }
    .markdown-body hr { border: none; border-top: 1px solid #334155; margin: 0.8em 0; }
    .markdown-body a { color: #818cf8; text-decoration: underline; text-underline-offset: 2px; }
    .markdown-body a:hover { color: #a5b4fc; }
    .markdown-body table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
    .markdown-body th, .markdown-body td {
      border: 1px solid #334155;
      padding: 0.35em 0.6em;
      font-size: 0.9em;
    }
    .markdown-body th { background: #1e293b; color: #e2e8f0; font-weight: 600; }

    /* ── Tool-call / capability status pill ─────────────────────── */
    .tool-status {
      display: flex;
      align-items: center;
      gap: 0.5em;
      padding: 0.4em 0.8em;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid #1e293b;
      border-radius: 9999px;
      font-size: 0.75rem;
      color: #94a3b8;
      width: fit-content;
    }
    .tool-status svg { flex-shrink: 0; }
    .tool-status.active { color: #818cf8; border-color: rgba(99, 102, 241, 0.3); background: rgba(79, 70, 229, 0.1); }
    .tool-status.active svg { animation: spin 2s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── Confirmation card ──────────────────────────────────────── */
    .confirm-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1em;
      margin: 0.5em 0;
      max-width: 72%;
    }
    .confirm-card pre {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 0.6em 0.8em;
      font-size: 0.78em;
      color: #94a3b8;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    .confirm-card .confirm-actions {
      display: flex;
      gap: 0.5em;
      margin-top: 0.6em;
    }
    .confirm-card .btn-approve {
      background: #065f46;
      color: #6ee7b7;
      border: 1px solid #059669;
      padding: 0.35em 1em;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .confirm-card .btn-approve:hover { background: #047857; }
    .confirm-card .btn-deny {
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #dc2626;
      padding: 0.35em 1em;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .confirm-card .btn-deny:hover { background: #991b1b; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-200 font-sans h-dvh flex overflow-hidden antialiased">

  <!-- Sidebar Navigation -->
  <aside class="w-[220px] bg-slate-900 border-r border-slate-800 flex flex-col flex-shrink-0">
    <!-- Logo -->
    <div class="px-5 h-14 flex items-center border-b border-slate-800">
      <a href="/chat" class="flex items-center gap-2.5 group">
        <div class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center">
          <svg class="w-4.5 h-4.5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="text-[15px] font-bold text-white tracking-tight">PAP</span>
      </a>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <div class="px-2 pb-2 text-[10px] font-semibold uppercase tracking-widest text-slate-500">Main</div>

      <a href="/chat" class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm transition-colors {% if active_nav == "chat" %}bg-brand-600/15 text-brand-300 font-medium{% else %}text-slate-400 hover:text-slate-200 hover:bg-slate-800{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Chat
      </a>

      <a href="/pipes" class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm transition-colors {% if active_nav == "pipes" %}bg-brand-600/15 text-brand-300 font-medium{% else %}text-slate-400 hover:text-slate-200 hover:bg-slate-800{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Pipes
      </a>

      <a href="/agents" class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm transition-colors {% if active_nav == "agents" %}bg-brand-600/15 text-brand-300 font-medium{% else %}text-slate-400 hover:text-slate-200 hover:bg-slate-800{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4m-8.66-13H7.34m9.32 0h4m-14.14 5.66l2.83-2.83m7.07-7.07l2.83-2.83M4.22 4.22l2.83 2.83m7.07 7.07l2.83 2.83"/></svg>
        Agents
      </a>

      <a href="/providers" class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm transition-colors {% if active_nav == "providers" %}bg-brand-600/15 text-brand-300 font-medium{% else %}text-slate-400 hover:text-slate-200 hover:bg-slate-800{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Providers
      </a>

      <a href="/users" class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm transition-colors {% if active_nav == "users" %}bg-brand-600/15 text-brand-300 font-medium{% else %}text-slate-400 hover:text-slate-200 hover:bg-slate-800{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </a>

      <div class="px-2 pt-5 pb-2 text-[10px] font-semibold uppercase tracking-widest text-slate-500">Advanced</div>

      <a href="/credentials" class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm transition-colors {% if active_nav == "credentials" %}bg-brand-600/15 text-brand-300 font-medium{% else %}text-slate-500 hover:text-slate-300 hover:bg-slate-800{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Credentials
      </a>

      <a href="/subscriptions" class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm transition-colors {% if active_nav == "subscriptions" %}bg-brand-600/15 text-brand-300 font-medium{% else %}text-slate-500 hover:text-slate-300 hover:bg-slate-800{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Events
      </a>
    </nav>

    <!-- User / Logout -->
    <div class="px-3 py-3 border-t border-slate-800">
      <form method="POST" action="/logout">
        <button type="submit" class="w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm text-slate-500 hover:text-slate-300 hover:bg-slate-800 transition-colors cursor-pointer">
          <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </form>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    {% block body %}{% endblock %}
  </main>

  <script>
    // Configure marked for safe rendering
    marked.setOptions({
      breaks: true,
      gfm: true,
    });

    // Render markdown in an element, replacing its text content
    function renderMarkdown(el) {
      if (!el || el.dataset.mdRendered) return;
      const raw = el.textContent || '';
      el.innerHTML = marked.parse(raw);
      el.dataset.mdRendered = '1';
    }

    // Render all assistant messages that haven't been rendered yet
    function renderAllMarkdown() {
      document.querySelectorAll('.md-source:not([data-md-rendered])').forEach(renderMarkdown);
    }

    // For streaming: collect raw tokens in a data attribute, re-render markdown
    function appendStreamToken(el, tokenText) {
      if (!el) return;
      const raw = (el.dataset.rawContent || '') + tokenText;
      el.dataset.rawContent = raw;
      el.innerHTML = marked.parse(raw);
    }

    // Finalize a streaming message: remove streaming class, final render
    function finalizeStream(streamId) {
      var el = document.getElementById('stream-' + streamId);
      if (el) {
        el.classList.remove('streaming');
        // Final markdown render from accumulated raw content
        var raw = el.dataset.rawContent || el.textContent || '';
        if (raw.trim()) {
          el.innerHTML = marked.parse(raw);
        }
        el.dataset.mdRendered = '1';
        // If the streaming div is empty (no content), remove its parent bubble wrapper
        if (!raw.trim()) {
          var bubble = el.closest('.flex.justify-start');
          if (bubble) bubble.remove();
        }
      }
      // Remove tool-status pills once the stream is done
      document.querySelectorAll('.tool-status').forEach(function(pill) {
        var wrapper = pill.closest('.flex.justify-start');
        if (wrapper) wrapper.remove();
      });
      // Also finalize any continuation divs
      document.querySelectorAll('[id^="cont-"]').forEach(function(contEl) {
        contEl.classList.remove('streaming');
        var contRaw = contEl.dataset.rawContent || '';
        if (contRaw.trim()) {
          contEl.innerHTML = marked.parse(contRaw);
          contEl.dataset.mdRendered = '1';
        } else {
          // Remove empty continuation bubbles
          var contBubble = contEl.closest('.flex.justify-start');
          if (contBubble) contBubble.remove();
        }
      });
    }

    // Auto-resize textarea
    document.addEventListener('input', e => {
      if (e.target.tagName === 'TEXTAREA') {
        e.target.style.height = 'auto';
        e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
      }
    });
    // Submit textarea on Enter (Shift+Enter = newline)
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'TEXTAREA' && e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        e.target.closest('form')?.requestSubmit();
      }
    });

    // Render markdown on page load and scroll messages to bottom
    document.addEventListener('DOMContentLoaded', function() {
      renderAllMarkdown();
      var msgs = document.getElementById('messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    });
  </script>
</body>
</html>
