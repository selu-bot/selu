<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAP — First-Run Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #6c63ff;
      --accent-d:  #5a52d5;
      --success:   #22c55e;
      --text:      #e2e8f0;
      --muted:     #718096;
      --radius:    10px;
      --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .setup-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .setup-box .logo {
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--accent);
      text-align: center;
    }
    .setup-box .subtitle {
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: -0.5rem;
    }
    .setup-box .info {
      background: rgba(108,99,255,0.1);
      border: 1px solid rgba(108,99,255,0.3);
      color: #c4b5fd;
      padding: 0.6rem 0.875rem;
      border-radius: 7px;
      font-size: 0.825rem;
      line-height: 1.5;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }
    .form-group input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 0.6rem 0.75rem;
      font-family: var(--font);
      font-size: 0.9rem;
      transition: border-color 0.15s;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .form-group input::placeholder { color: var(--muted); }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 1rem;
      border-radius: 7px;
      border: none;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: background 0.15s;
      width: 100%;
    }
    .btn-primary:hover { background: var(--accent-d); }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 0.6rem 0.875rem;
      border-radius: 7px;
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="setup-box">
    <div class="logo">PAP</div>
    <div class="subtitle">First-Run Setup</div>
    <div class="info">
      Welcome! Create your admin account to get started.
      This page is only available when no users exist.
    </div>
    {% if let Some(err) = error %}
    <div class="error-msg">{{ err }}</div>
    {% endif %}
    <form method="POST" action="/setup">
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="admin" required autofocus />
        </div>
        <div class="form-group">
          <label for="display_name">Display Name</label>
          <input type="text" id="display_name" name="display_name" placeholder="Jan" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Choose a strong password" required />
        </div>
        <button type="submit" class="btn-primary">Create Account &amp; Start</button>
      </div>
    </form>
  </div>
</body>
</html>
