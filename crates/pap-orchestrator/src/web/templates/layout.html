<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAP — {% block title %}Personal Agent Platform{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #6c63ff;
      --accent-d: #5a52d5;
      --text:     #e2e8f0;
      --muted:    #718096;
      --user-bg:  #2d3748;
      --asst-bg:  #1e293b;
      --radius:   10px;
      --font:     -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    nav .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--text); }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .pipe-item {
      padding: 0.65rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-decoration: none;
      color: var(--text);
    }
    .pipe-item:hover { background: rgba(108,99,255,0.08); }
    .pipe-item.active { border-left-color: var(--accent); background: rgba(108,99,255,0.12); }
    .pipe-item .pipe-name { font-size: 0.9rem; font-weight: 500; }
    .pipe-item .pipe-meta { font-size: 0.75rem; color: var(--muted); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 0.875rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
      background: var(--surface);
    }
    .chat-header .pipe-title { font-weight: 600; }
    .chat-header .pipe-subtitle { font-size: 0.8rem; color: var(--muted); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      background: var(--user-bg);
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }
    .message.assistant {
      background: var(--asst-bg);
      align-self: flex-start;
      border-bottom-left-radius: 3px;
      border: 1px solid var(--border);
    }
    .message.status {
      background: none;
      align-self: flex-start;
      color: var(--muted);
      font-size: 0.8rem;
      font-style: italic;
      padding: 0.25rem 0;
    }
    .message .meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    /* streaming cursor */
    .streaming::after {
      content: "▋";
      animation: blink 1s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Input bar ── */
    .input-bar {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-bar form {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    .input-bar textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.65rem 0.875rem;
      font-family: var(--font);
      font-size: 0.9rem;
      resize: none;
      max-height: 160px;
      min-height: 42px;
      line-height: 1.5;
    }
    .input-bar textarea:focus { outline: none; border-color: var(--accent); }
    .input-bar textarea::placeholder { color: var(--muted); }
    .input-bar button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.65rem 1.1rem;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s;
      height: 42px;
    }
    .input-bar button:hover { background: var(--accent-d); }
    .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── No pipe selected ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--muted);
    }
    .empty-state .big { font-size: 2rem; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="logo">PAP</span>
    <a href="/chat" class="{% if active_nav == "chat" %}active{% endif %}">Chat</a>
    <a href="/agents" class="{% if active_nav == "agents" %}active{% endif %}">Agents</a>
    <a href="/pipes" class="{% if active_nav == "pipes" %}active{% endif %}">Pipes</a>
  </nav>
  <div class="layout">
    {% block body %}{% endblock %}
  </div>
  <script>
    // Auto-resize textarea
    document.addEventListener('input', e => {
      if (e.target.tagName === 'TEXTAREA') {
        e.target.style.height = 'auto';
        e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
      }
    });
    // Submit on Enter (Shift+Enter = newline)
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'TEXTAREA' && e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        e.target.closest('form')?.requestSubmit();
      }
    });
  </script>
</body>
</html>
