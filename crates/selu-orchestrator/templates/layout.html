  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#FFF5F3',
              100: '#FFE8E4',
              200: '#FFD0C9',
              300: '#FFB0A3',
              400: '#FF8D7D',
              500: '#FF6B5A',
              600: '#E85A4A',
              700: '#CC4A3C',
              800: '#A33B30',
              900: '#7A2C24',
            },
            coral:  '#FF6B5A',
            amber:  '#FF9F67',
            blush:  '#FF7EB3',
            navy:   '#2D2B55',
            dark:   '#1E1B3A',
            muted:  '#8E8AA0',
            warm:   '#FFF8F5',
            sunny:  '#FFD93D',
            rosie:  '#FF4070',
            /* Semantic colors via CSS vars */
            surface: {
              DEFAULT: 'var(--c-surface)',
              alt:     'var(--c-surface-alt)',
              raised:  'var(--c-surface-raised)',
              input:   'var(--c-surface-input)',

            },

              hover:   'var(--c-sidebar-hover)',

          },

            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"SF Mono"', '"Fira Code"', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ══ Theme Variables ═══════════════════════════════════════════ */
    :root, html.light {
      --c-surface:       #FFFFFF;
      --c-surface-alt:   #F7F5F3;
      --c-surface-raised:#FFFFFF;
      --c-surface-input: #F2F0EE;
      --c-edge:          #E5E2DD;
      --c-edge-strong:   #D0CCC6;
      --c-text:          #3D3A50;
      --c-text-heading:  #1E1B3A;
      --c-text-muted:    #7A7890;
      --c-text-faint:    #A09EB0;
      --c-sidebar:       #F7F5F3;
      --c-sidebar-hover: rgba(0,0,0,0.04);
      --c-nav-active-bg: rgba(255,107,90,0.08);
      --c-nav-text:      #5C596E;
      --c-card-bg:       #FFFFFF;
      --c-card-border:   #E5E2DD;
      --c-input-border:  #D0CCC6;
      --c-scrollbar:     #D0CCC6;
      --c-scrollbar-h:   #B0ADA6;
      --c-code-bg:       #F5F3F0;
      --c-code-border:   #E5E2DD;
      --c-pre-bg:        #F0EDEA;
      --c-md-strong:     #1E1B3A;
      --c-md-em:         #5C596E;
      --c-table-header:  #F2F0EE;
    }
    html.dark {
      --c-surface:       #151229;
      --c-surface-alt:   #1A1735;
      --c-surface-raised:#1E1B3A;
      --c-surface-input: #151229;
      --c-edge:          #3D3A5C;
      --c-edge-strong:   #514D75;
      --c-text:          #E0DDF0;
      --c-text-heading:  #FFFFFF;
      --c-text-muted:    #A09EB0;
      --c-text-faint:    #706D88;
      --c-sidebar:       rgba(45,43,85,0.7);
      --c-sidebar-hover: rgba(255,255,255,0.06);
      --c-nav-active-bg: rgba(255,107,90,0.12);
      --c-nav-text:      #C0BDD0;
      --c-card-bg:       #1E1B3A;
      --c-card-border:   #3D3A5C;
      --c-input-border:  #514D75;
      --c-scrollbar:     #3D3A5C;
      --c-scrollbar-h:   #514D75;
      --c-code-bg:       rgba(45,43,85,0.5);
      --c-code-border:   #3D3A5C;
      --c-pre-bg:        #111024;
      --c-md-strong:     #F0EDE8;
      --c-md-em:         #D0CDE0;
      --c-table-header:  #2D2B55;
    }

    /* ── Animations ──────────────────────────────────────────────── */
    @keyframes blink { 50% { opacity: 0; } }
    .streaming::after {
      content: "\25CB";
      animation: blink 1s step-end infinite;
      color: #FF6B5A;
      margin-left: 2px;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-fadein { animation: fadeIn 0.3s ease-out; }

    /* ── Scrollbar ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--c-scrollbar); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--c-scrollbar-h); }

    /* ── HTMX ────────────────────────────────────────────────────── */
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }

    /* ── Markdown prose ──────────────────────────────────────────── */
    .markdown-body { line-height: 1.65; word-wrap: break-word; }
    .markdown-body p { margin: 0.4em 0; }
    .markdown-body p:first-child { margin-top: 0; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body strong { color: var(--c-md-strong); font-weight: 600; }
    .markdown-body em { color: var(--c-md-em); }
    .markdown-body ul, .markdown-body ol { margin: 0.4em 0; padding-left: 1.5em; }
    .markdown-body li { margin: 0.15em 0; }
    .markdown-body li::marker { color: var(--c-text-muted); }
    .markdown-body code {
      background: var(--c-code-bg);
      border: 1px solid var(--c-code-border);
      border-radius: 4px;
      padding: 0.15em 0.35em;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      color: var(--c-text-heading);
    }
    .markdown-body pre {
      background: var(--c-pre-bg);
      border: 1px solid var(--c-edge);
      border-radius: 8px;
      padding: 0.85em 1em;
      margin: 0.5em 0;
      overflow-x: auto;
    }
    .markdown-body pre code {
      background: none; border: none; padding: 0;
      font-size: 0.82em; color: var(--c-text);
    }
    .markdown-body blockquote {
      border-left: 3px solid #FF6B5A;
      padding-left: 0.8em;
      margin: 0.5em 0;
      color: var(--c-text-muted);
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3,
    .markdown-body h4, .markdown-body h5, .markdown-body h6 {
      color: var(--c-text-heading); font-weight: 600; margin: 0.6em 0 0.3em;
      font-family: 'Nunito', sans-serif;
    }
    .markdown-body h1 { font-size: 1.3em; }
    .markdown-body h2 { font-size: 1.15em; }
    .markdown-body h3 { font-size: 1.05em; }
    .markdown-body hr { border: none; border-top: 1px solid var(--c-edge); margin: 0.8em 0; }
    .markdown-body a { color: #FF6B5A; text-decoration: underline; text-underline-offset: 2px; }
    .markdown-body a:hover { color: #FF9F67; }
    .markdown-body table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
    .markdown-body th, .markdown-body td {
      border: 1px solid var(--c-edge); padding: 0.35em 0.6em; font-size: 0.9em;
    }
    .markdown-body th { background: var(--c-table-header); color: var(--c-text-heading); font-weight: 600; }

    /* ── Tool-call pill ──────────────────────────────────────────── */
    .tool-status {
      display: flex; align-items: center; gap: 0.5em;
      padding: 0.4em 0.8em;
      background: var(--c-surface-raised);
      border: 1px solid var(--c-edge);
      border-radius: 9999px;
      font-size: 0.75rem; color: var(--c-text-muted); width: fit-content;
    }
    .tool-status svg { flex-shrink: 0; }
    .tool-status.active { color: #FF6B5A; border-color: rgba(255, 107, 90, 0.3); background: rgba(255, 107, 90, 0.08); }
    .tool-status.active svg { animation: spin 2s linear infinite; }

    /* ── Confirmation card ───────────────────────────────────────── */
    .confirm-card {
      background: var(--c-card-bg); border: 1px solid var(--c-card-border);
      border-radius: 12px; padding: 1em; margin: 0.5em 0; max-width: 72%;
    }
    .confirm-card pre {
      background: var(--c-surface); border: 1px solid var(--c-edge);
      border-radius: 6px; padding: 0.6em 0.8em;
      font-size: 0.78em; color: var(--c-text-muted); overflow-x: auto; margin: 0.5em 0;
    }
    .confirm-card .confirm-actions { display: flex; gap: 0.5em; margin-top: 0.6em; }
    .confirm-card .btn-approve {
      background: #065f46; color: #6ee7b7; border: 1px solid #059669;
      padding: 0.35em 1em; border-radius: 8px; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .confirm-card .btn-approve:hover { background: #047857; }
    .confirm-card .btn-deny {
      background: #7f1d1d; color: #fca5a5; border: 1px solid #dc2626;
      padding: 0.35em 1em; border-radius: 8px; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .confirm-card .btn-deny:hover { background: #991b1b; }

    /* ── Gradient accents ────────────────────────────────────────── */
    .gradient-coral { background: linear-gradient(135deg, #FF6B5A, #FF9F67); }
    .gradient-blush { background: linear-gradient(135deg, #FF7EB3, #FF6B5A); }
    .text-gradient-coral {
      background: linear-gradient(135deg, #FF6B5A, #FF9F67);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── Sidebar active indicator ────────────────────────────────── */
    .nav-active {
      background: var(--c-nav-active-bg);
      border-left: 3px solid #FF6B5A;
    }

    /* ── Card component ──────────────────────────────────────────── */
    .selu-card {
      background: var(--c-card-bg);
      border: 1px solid var(--c-card-border);
    }

    /* ── Theme transition ────────────────────────────────────────── */
    html { transition: background-color 0.2s ease, color 0.2s ease; }
    html * { transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease; }
    html svg, html img, html .animate-float, html .animate-fadein { transition: none; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-surface text-txt font-sans h-dvh flex overflow-hidden antialiased">

            class="p-1.5 rounded-lg hover:bg-sidebar-hover transition-colors" aria-label="Open menu">

    </button>

    // ── Base path for reverse-proxy sub-path deployments ────────────

    // ── Mobile sidebar toggle ──────────────────────────────────────
    function closeSidebar() {
      var sb = document.getElementById('sidebar');
      var bd = document.getElementById('sidebar-backdrop');
      if (sb) sb.classList.add('-translate-x-full');
      if (bd) bd.classList.add('hidden');
    }

    // ── Theme System ───────────────────────────────────────────────
    function getTheme() {
      return localStorage.getItem('selu-theme') || 'dark';
    }
    function applyTheme(theme) {
      var html = document.documentElement;
      html.classList.remove('dark', 'light');
      html.classList.add(theme);
      localStorage.setItem('selu-theme', theme);
      var sun = document.getElementById('theme-icon-sun');
      var moon = document.getElementById('theme-icon-moon');
      var label = document.getElementById('theme-label');
      if (sun && moon && label) {
        if (theme === 'dark') {
          sun.classList.remove('hidden');
          moon.classList.add('hidden');
          label.textContent = getCurrentLang() === 'de' ? 'Heller Modus' : 'Light mode';
        } else {
          sun.classList.add('hidden');
          moon.classList.remove('hidden');
          label.textContent = getCurrentLang() === 'de' ? 'Dunkler Modus' : 'Dark mode';
        }
      }
    }
    function toggleTheme() {
      applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
    }

    function getCurrentLang() {
      return localStorage.getItem('selu-lang') || 'en';
    }
    function setLang(lang) {
      localStorage.setItem('selu-lang', lang);
      document.documentElement.lang = lang;
      applyTranslations(lang);
      var label = document.getElementById('lang-label');
      if (label) label.textContent = lang.toUpperCase();
      // Also update theme label to match language
      applyTheme(getTheme());
    }
    function toggleLang() {
      setLang(getCurrentLang() === 'en' ? 'de' : 'en');
    }
    function t(key) {
      var lang = getCurrentLang();
      return (translations[lang] && translations[lang][key]) || (translations.en[key]) || key;
    }
    function applyTranslations(lang) {
      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        var val = (translations[lang] && translations[lang][key]) || translations.en[key];
        if (val) el.textContent = val;
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
        var key = el.getAttribute('data-i18n-placeholder');
        var val = (translations[lang] && translations[lang][key]) || translations.en[key];
        if (val) el.placeholder = val;
      });
    }

    // ── Markdown rendering ─────────────────────────────────────────
    marked.setOptions({ breaks: true, gfm: true });
    function renderMarkdown(el) {
      if (!el || el.dataset.mdRendered) return;
      var raw = el.textContent || '';
      el.innerHTML = marked.parse(raw);
      el.dataset.mdRendered = '1';
    }
    function renderAllMarkdown() {
      document.querySelectorAll('.md-source:not([data-md-rendered])').forEach(renderMarkdown);
    }
    function appendStreamToken(el, tokenText) {
      if (!el) return;
      var raw = (el.dataset.rawContent || '') + tokenText;
      el.dataset.rawContent = raw;
      el.innerHTML = marked.parse(raw);
      // Show the wrapper on first token
      var wrap = el.closest('[id^="stream-wrap-"]');
      if (wrap && wrap.style.display === 'none') wrap.style.display = '';
    }
    function finalizeStream(streamId) {
      var el = document.getElementById('stream-' + streamId);
      if (el) {
        el.classList.remove('streaming');
        var raw = el.dataset.rawContent || el.textContent || '';
        if (raw.trim()) { el.innerHTML = marked.parse(raw); }
        el.dataset.mdRendered = '1';
        // Remove the wrapper if empty; otherwise ensure it is visible
        var wrap = document.getElementById('stream-wrap-' + streamId);
        if (!raw.trim()) {
          if (wrap) wrap.remove();
        } else if (wrap) {
          wrap.style.display = '';
        }
      }
      document.querySelectorAll('.tool-status').forEach(function(pill) {
        var wrapper = pill.closest('.flex.justify-start');
        if (wrapper) wrapper.remove();
      });
      document.querySelectorAll('[id^="cont-"]').forEach(function(contEl) {
        contEl.classList.remove('streaming');
        var contRaw = contEl.dataset.rawContent || '';
        if (contRaw.trim()) {
          contEl.innerHTML = marked.parse(contRaw);
          contEl.dataset.mdRendered = '1';
        } else {
          var contBubble = contEl.closest('.flex.justify-start');
          if (contBubble) contBubble.remove();
        }
      });
    }

    // ── Auto-resize textarea ────────────────────────────────────────
    document.addEventListener('input', function(e) {
      if (e.target.tagName === 'TEXTAREA') {
        e.target.style.height = 'auto';
        e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
      }
    });
    // Re-apply translations on HTMX swaps (for dynamically injected i18n elements)
    document.addEventListener('htmx:afterSettle', function() {
      applyTranslations(getCurrentLang());
    });
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'TEXTAREA' && e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        var form = e.target.closest('form');
        if (form) form.requestSubmit();
      }
    });

    // ── Init ────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      renderAllMarkdown();
      var msgs = document.getElementById('messages');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
      var lang = getCurrentLang();
      document.documentElement.lang = lang;
      var label = document.getElementById('lang-label');
      if (label) label.textContent = lang.toUpperCase();
      applyTranslations(lang);
      applyTheme(getTheme());
    });
    // Apply theme immediately to prevent flash
    (function() {
      var t = localStorage.getItem('selu-theme') || 'dark';
      document.documentElement.classList.remove('dark','light');
      document.documentElement.classList.add(t);
    })();
  </script>
