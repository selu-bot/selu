name: Build & Push Docker Image

on:
  push:
    branches: [main]
  create:
    tags:
      - "release_*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Determine image tags ───────────────────────────────────────────
      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')

          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" =~ ^release_(.+)$ ]]; then
            # Tag event: release_x.x.x → latest + x.x.x
            VERSION="${BASH_REMATCH[1]}"
            echo "tags=${IMAGE}:latest,${IMAGE}:${VERSION}" >> "$GITHUB_OUTPUT"
            echo "### Release build: \`${VERSION}\` + \`latest\`" >> "$GITHUB_STEP_SUMMARY"
          else
            # Push to main → dev_<timestamp>
            TS=$(date -u +%Y%m%d_%H%M%S)
            echo "tags=${IMAGE}:dev_${TS}" >> "$GITHUB_OUTPUT"
            echo "### Dev build: \`dev_${TS}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Build + push multi-arch image ──────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
