name: Stable Release Metadata Sync

on:
  release:
    types: [published]

jobs:
  sync-stable-release-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver release tag
        id: validate
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Release tag '${RELEASE_TAG}' is not semver (expected vMAJOR.MINOR.PATCH). Skipping metadata sync."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "valid=true" >> "$GITHUB_OUTPUT"
          echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"

      - name: Trigger stable release metadata sync
        if: steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.SELU_SITE_WORKFLOW_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ steps.validate.outputs.version }}
          CHANGELOG_URL: ${{ github.event.release.html_url }}
          CHANGELOG_BODY: ${{ github.event.release.body }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "SELU_SITE_WORKFLOW_TOKEN is not set. Skipping release metadata sync dispatch."
            exit 0
          fi

          payload=$(jq -n \
            --arg channel "stable" \
            --arg tag "${RELEASE_TAG}" \
            --arg version "${VERSION}" \
            --arg changelog_url "${CHANGELOG_URL}" \
            --arg changelog_body "${CHANGELOG_BODY}" \
            --arg image_repo "${{ github.repository }}" \
            '{event_type:"selu-release-published",client_payload:{channel:$channel,tag:$tag,version:$version,changelog_url:$changelog_url,changelog_body:$changelog_body,image_repo:$image_repo}}')

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${GH_TOKEN}" \
            https://api.github.com/repos/selu-bot/selu-site/dispatches \
            -d "${payload}"
