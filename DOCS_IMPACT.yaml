    details: |
      Added a new built-in tool `set_schedule` for recurring schedules, similar
      to the existing `set_reminder` one-shot tool.

      This enables natural-language chat requests like "every weekday at 06:45..."
      to be handled by the agent through tool invocation instead of relying on
      special text parsing at the chat transport layer.

      Slash commands remain supported (`/schedule`, `/remind`) for users who
      prefer explicit commands.

      Tool policy updates:
      - `set_schedule` is now part of built-in tool policy completeness checks
      - bundled/default agent policies seed and backfill now include `set_schedule`
      - Agent detail UI now lists both `set_schedule` and `set_reminder` under
        built-in tools with English/German labels

  - id: 2026-03-04-reminder-timezone-handling
    date: "2026-03-04"
    pr:
    area: ui
    type: changed
    audience: users
    summary: "Reminder times are now interpreted in the user's timezone when no UTC offset is provided"
    affected_files:
      - crates/selu-orchestrator/src/schedules/mod.rs
      - crates/selu-orchestrator/src/web/schedules.rs
    docs_sections:
      - user-guide/channels/web-chat
      - user-guide/agents
      - developer-guide/built-in-tools
    details: |
      Fixed confusing timezone behavior for one-shot reminders created via the
      built-in `set_reminder` tool.

      Before:
      - naive timestamps like `2026-03-04T11:10:00` were interpreted as UTC
      - this could schedule reminders one hour late/early for users outside UTC

      After:
      - timestamps with explicit timezone/offset are honored as-is
      - naive timestamps are interpreted in the user's configured timezone
      - optional `timezone` argument can override the user's timezone for a
        specific reminder tool call

      Also updated schedules page display:
      - `next_run_at` and `last_run_at` now render in the user's timezone with
        timezone abbreviation (e.g. `CET`, `CEST`) instead of raw UTC-like values.
  - id: 2026-03-04-provider-onboarding-wizard
    date: "2026-03-04"
