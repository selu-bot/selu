      Selu now supports xAI Grok through the existing provider system.

      Admins can add Grok from the Providers UI, save an xAI API key, and use an
      optional custom base URL (default is `https://api.x.ai`). Provider
      connection checks now validate Grok credentials via `GET /v1/models`.

      Runtime provider loading and model listing now support the `grok`
      provider ID, including static fallback model entries and live model
      discovery.

  - id: 2026-03-28-system-updater-installed-version-source
    date: "2026-03-28"
    pr:
    area: updates
    type: changed
    audience: users
    summary: "System update checks now use the running Selu container image, and update actions prevent duplicate concurrent starts"
    affected_files:
      - crates/selu-updater/src/api.rs
      - crates/selu-updater/src/engine.rs
      - crates/selu-updater/src/config.rs
      - crates/selu-orchestrator/src/web/system_updates.rs
    docs_sections:
      - user-guide/self-hosting/updating
      - user-guide/self-hosting/docker
    details: |
      The updater no longer treats `.env` image values as the source of truth
      for "currently installed". Instead it resolves the running Selu service
      container via Docker Compose and reads its actual image digest/tag.

      This fixes false "already on latest version" results when desired image
      variables and real running container state diverge.

      The orchestrator now atomically claims the active update job slot before
      starting check/apply/rollback actions, so repeated clicks cannot start
      multiple concurrent system update jobs.
  - id: 2026-03-28-pipe-inbound-images-and-aggregation
    date: "2026-03-28"
    pr:
    area: pipes
    type: changed
    audience: both
    summary: "Inbound pipes now support image attachments and short-window text/image aggregation before agent turns"
    affected_files:
      - crates/selu-core/src/types.rs
      - crates/selu-orchestrator/src/pipes/ingest.rs
      - crates/selu-orchestrator/src/pipes/inbound.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/bluebubbles/adapter.rs
      - crates/selu-orchestrator/src/telegram/adapter.rs
      - sidecars/whatsapp-bridge/src/index.js
    docs_sections:
      - user-guide/channels/web-chat
      - user-guide/channels/imessage
      - user-guide/channels/telegram
      - user-guide/channels/whatsapp
      - reference/api
    details: |
      The inbound message contract now accepts optional `attachments` on
      `InboundEnvelope` (with `filename`, `mime_type`, optional `size_bytes`,
      and either `download_url` or `data_base64`).

      Selu now aggregates split text/image inbound events in-memory for a short
      2-second window per pipe+conversation key, so transports that emit text
      and media as separate events can be merged into one agent turn.

      Inbound image attachments are normalized into session artifacts before the
      agent loop, and the user message passed to the model includes canonical
      artifact references. Image-only inbound messages are wrapped with a
      standard instruction prompt so the agent responds meaningfully.
  - id: 2026-03-29-web-chat-image-upload
    date: "2026-03-29"
    pr:
    area: web
    type: changed
    audience: users
    summary: "Web chat now supports attaching image files to a message"
    affected_files:
      - crates/selu-orchestrator/src/web/chat.rs
      - crates/selu-orchestrator/templates/chat.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/channels/web-chat
      - reference/api
    details: |
      The web chat compose form now supports image attachments via multipart
      requests. Users can send text-only, image-only, or text+image messages.

      Uploaded image files are validated server-side (image mime type and size
      limits) and forwarded into the standard agent turn attachment path.

      New chat UI copy/labels were added for image selection and image-send
      message bubbles in both English and German translations.
  - id: 2026-03-29-image-upload-fallback-and-artifact-filter
    date: "2026-03-29"
    pr:
    area: chat
    type: changed
    audience: users
    summary: "Image-upload chat responses now use friendly fallback copy and no longer list uploaded images as generated files"
    affected_files:
      - crates/selu-orchestrator/src/i18n.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/web/chat.rs
    docs_sections:
      - user-guide/channels/web-chat
    details: |
      Added server-side translation keys for web chat image-upload status labels,
      so UI bubbles do not show raw i18n keys.

      Inbound user-uploaded image artifacts are now excluded from the turn output
      attachment list, preventing "Generated files" from showing just because a
      user attached an image.

      When a model reply indicates it cannot view/process an image, Selu now
      rewrites the response to a friendlier localized fallback message asking the
      user to retry or describe the image.
  - id: 2026-03-29-multimodal-image-parts-across-providers
    date: "2026-03-29"
    pr:
    area: llm-providers
    type: changed
    audience: both
    summary: "Inbound image attachments are now sent as multimodal content parts to Anthropic, OpenAI-compatible providers, and Bedrock"
    affected_files:
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/llm/provider.rs
      - crates/selu-orchestrator/src/llm/openai.rs
      - crates/selu-orchestrator/src/llm/anthropic.rs
      - crates/selu-orchestrator/src/llm/bedrock.rs
      - crates/selu-orchestrator/src/llm/models.rs
    docs_sections:
      - user-guide/llm-providers/anthropic
      - user-guide/llm-providers/openai
      - user-guide/llm-providers/bedrock
      - user-guide/channels/web-chat
      - reference/api
    details: |
      User-uploaded inbound image attachments are now converted into multimodal
      `MessageContent::Parts` payloads and injected into the latest user turn,
      rather than being passed only as text artifact references.

      Provider mappings now serialize image parts in each API's native format:
      - OpenAI-compatible providers (OpenAI, Grok, Pico): `image_url` data URLs
      - Anthropic: `image` blocks with base64 source
      - Bedrock Converse: `image` blocks with bytes source

      Grok model listing no longer filters out IDs containing `vision`/`image`,
      so multimodal-capable models remain selectable.
  - id: 2026-03-29-chat-image-preview-and-remove
    date: "2026-03-29"
