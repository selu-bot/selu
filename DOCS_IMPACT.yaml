# Documentation Impact Log
#
# This file tracks code changes that require documentation updates.
# It is append-only — entries are never removed.
#
# HOW IT WORKS:
# 1. When you make a docs-relevant change, append an entry below.
# 2. CI checks that docs-relevant PRs include an entry (or the `docs-impact: none` label).
# 3. After merge to main, a workflow reads new entries and creates a docs PR in selu-site.
#
# See AGENTS.md section "Documentation impact" for full details on when and how to add entries.
#
# ENTRY FORMAT:
#
# - id: YYYY-MM-DD-short-slug       # unique identifier
#   date: YYYY-MM-DD                 # date of the change
#   pr: <number>                     # selu PR number (fill in when known)
#   area: <area>                     # capabilities | agents | channels | llm | permissions | events | api | ui | config
#   type: <type>                     # added | changed | removed | deprecated
#   audience: <audience>             # users | developers | both
#   summary: "Short description"     # one-line summary of the docs impact
#   affected_files:                  # source files that changed
#     - path/to/file.rs
#   docs_sections:                   # which docs pages need updating
#     - developer-guide/capabilities/container-guidelines
#   details: |                       # enough context for a docs author to write the update
#     Multi-line description of what changed, why, and how it affects
#     the user or developer experience.

entries:
  - id: 2026-04-09-shared-multimodal-image-normalization
    date: "2026-04-09"
    pr:
    area: llm
    type: changed
    audience: both
    summary: "Oversized image attachments are now resized/compressed before multimodal LLM calls across providers"
    affected_files:
      - crates/selu-orchestrator/src/llm/provider.rs
      - crates/selu-orchestrator/src/llm/image_normalizer.rs
      - crates/selu-orchestrator/src/llm/bedrock.rs
      - crates/selu-orchestrator/src/agents/engine.rs
    docs_sections:
      - user-guide/channels/web-chat
      - user-guide/channels/imessage
      - user-guide/channels/telegram
      - user-guide/llm-providers/bedrock
      - developer-guide/capabilities/container-guidelines
    details: |
      Selu now applies a shared image-normalization pass before multimodal
      messages are sent to LLM providers. If an inline image exceeds the
      provider byte limit, Selu attempts to downscale and recompress it to fit.

      Bedrock explicitly uses a 5 MB image cap; providers without declared
      limits currently use the same default cap for safety.

      If normalization still cannot fit the image into the limit, Selu omits
      that image from the model input so the turn can continue instead of
      failing the full request.

  - id: 2026-03-29-default-agent-selective-memory-guidance
    date: "2026-03-29"
    pr:
    area: agents
    type: changed
    audience: users
    summary: "Default assistant now uses memory tools selectively with explicit guardrails"
    affected_files:
      - agents/default/agent.md
    docs_sections:
      - user-guide/agents
    details: |
      Updated the bundled default agent prompt guidance so long-term memory
      usage is explicit and selective instead of implicit.

      The assistant is now instructed to:
      - use `memory_search` when stable past context is likely relevant
      - save only durable, reusable facts with `memory_remember`
      - avoid storing one-off chat details, temporary states, or secrets
      - use `store_*` for exact mutable/checkpoint state rather than prose notes

      This clarifies practical memory behavior and reduces low-value memory
      writes while preserving continuity for recurring user needs.

  - id: 2026-03-16-mobile-chat-thread-selection
    date: "2026-03-16"
    pr:
    area: ui
    type: changed
    audience: users
    summary: "Mobile users can now open and select chat threads via a slide-in drawer"
    affected_files:
      - crates/selu-orchestrator/templates/chat.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/channels/web-chat
    details: |
      On mobile devices (below the md breakpoint), the chat thread sidebar was
      previously hidden off-screen with no accessible entry point, making it
      impossible to select or switch conversations.

      The fix introduces a right-side slide-in drawer pattern for mobile:
      - A chat-bubble icon button in the mobile top bar (always visible on the
        Chat page) opens the thread drawer.
      - A hamburger-style button in the chat header (visible when a thread is
        open) also opens the drawer.
      - When a pipe is selected but no thread is active, an "Open conversations"
        button is shown instead of the desktop-only sidebar hint text.
      - Tapping a thread in the drawer auto-dismisses it.
      - A close (×) button and backdrop tap also dismiss the drawer.

      The desktop two-column layout (always-visible sidebar) is unchanged.
      All new strings are available in English and German.

  - id: 2026-03-16-agent-session-isolation-mode
    date: "2026-03-16"
    pr:
    area: agents
    type: changed
    audience: developers
    summary: "Agents can now opt into per-thread session isolation via agent.yaml to avoid shared capability workspaces across threads"
    affected_files:
      - crates/selu-orchestrator/src/agents/loader.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/agents/thread.rs
      - crates/selu-orchestrator/src/web/chat.rs
      - crates/selu-orchestrator/src/pipes/inbound.rs
      - crates/selu-orchestrator/src/telegram/adapter.rs
      - crates/selu-orchestrator/src/bluebubbles/adapter.rs
      - crates/selu-orchestrator/src/schedules/executor.rs
    docs_sections:
      - developer-guide/agent-format/agent-yaml
      - user-guide/agents
      - developer-guide/capabilities/container-guidelines
    details: |
      Added a new optional `session.isolation` setting in `agent.yaml` with
      values:
      - `shared` (default): existing behavior, reuses active sessions for the
        same user+agent.
      - `per_thread`: forces dedicated sessions per thread.

      When `per_thread` is set, Selu now avoids session/container reuse across
      threads for that agent in both direct thread creation and delegated
      specialist turns. This is intended for stateful agents (for example
      coding/workspace agents) to prevent cross-thread state collisions.

  - id: 2026-03-05-noninteractive-approval-reply-fallback
    date: "2026-03-05"
    pr:
    area: permissions
    type: changed
    audience: users
    summary: "Ask-policy approvals on chat channels can now be approved with a normal reply when thread metadata is missing"
    affected_files:
      - crates/selu-orchestrator/src/permissions/approval_queue.rs
      - crates/selu-orchestrator/src/bluebubbles/adapter.rs
      - crates/selu-orchestrator/src/telegram/adapter.rs
      - crates/selu-orchestrator/src/pipes/inbound.rs
    docs_sections:
      - user-guide/security/tool-policies
      - user-guide/channels/web-chat
      - user-guide/channels/imessage
      - user-guide/channels/telegram
    details: |
      Async Ask-policy approvals previously depended on matching the exact
      conversation thread. On some channels, replies can arrive without
      reply/thread metadata, which caused approvals to be missed.

      Selu now uses a fallback matcher: if there is exactly one pending
      approval for the same user and pipe, a normal chat reply can approve it.
      If multiple approvals are pending on that pipe, Selu does not auto-approve
      to avoid approving the wrong action.

  - id: 2026-03-04-agent-detail-subpages
    date: "2026-03-04"
    pr:
    area: ui
    type: changed
    audience: users
    summary: "Agent detail is now split into focused subpages (Overview, Storage, Secrets, Network, Permissions)"
    affected_files:
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/templates/agents_detail.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/agents
      - user-guide/security/credentials
    details: |
      The previous single long /agents/{id} page was restructured into tabbed
      subpages:
      - /agents/{id} (Overview)
      - /agents/{id}/storage
      - /agents/{id}/secrets
      - /agents/{id}/network
      - /agents/{id}/permissions

      This reduces cognitive load by showing one concern per page.
      Actions related to permissions and credentials now keep users on the
      Permissions subpage instead of navigating back to Overview.
      Capability resource limits (memory, CPU, PIDs, filesystem) were also
      moved from the Network page into Overview for a faster at-a-glance
      summary.

  - id: 2026-03-04-agent-detail-storage-section
    date: "2026-03-04"
    pr:
    area: ui
    type: changed
    audience: users
    summary: "Agent detail now has separate Network, Storage, and Permissions sections, including storage inspection and delete actions"
    affected_files:
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/templates/agents_detail.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/agents
      - user-guide/security/credentials
    details: |
      The /agents/{id} detail page was reorganized into clearer sections:
      Network, Storage, and Permissions.

      A new Storage section now lists persistent key-value entries saved by
      agents through store_* built-in tools. Each row shows key, value, and
      timestamp; admins also see the owning user. Users can delete entries
      directly from the page.

      Existing permissions controls remain but are grouped under a dedicated
      Permissions section alongside credential management to reduce clutter.

  - id: 2026-03-03-agent-update-background-progress
    date: "2026-03-03"
    pr:
    area: ui
    type: changed
    audience: users
    summary: "Agent updates now run in the background with live progress and completion states"
    affected_files:
      - crates/selu-orchestrator/src/agents/marketplace.rs
      - crates/selu-orchestrator/src/state.rs
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/templates/agents.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/agents
      - reference/api
    details: |
      The Agents page update flow was changed from a blocking submit + browser
      confirmation dialog to a background workflow with in-page feedback.

      Users now see:
      - a custom confirmation modal
      - a live progress card while update work runs (based on real Docker
        image pull progress, not a simulated timer)
      - a success/error result state without immediate full-page reload

      New authenticated admin web endpoints were added for this flow:
      - POST /agents/update/start
      - GET /agents/update/status/{job_id}

      The previous POST /agents/update endpoint remains available for
      synchronous form submissions.

  - id: 2026-03-03-agent-detail-secrets
    date: "2026-03-03"
    pr:
    area: ui
    type: added
    audience: both
    summary: "Credential management is now available directly on the agent detail page"
    affected_files:
      - crates/selu-orchestrator/src/capabilities/manifest.rs
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/templates/agents_detail.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/agents
      - user-guide/security/credentials
      - developer-guide/capabilities/container-guidelines
      - reference/manifest-yaml-schema
    details: |
      The agent detail page (/agents/{id}) now shows a "Secrets" section inside
      each capability card. Each secret declared in the capability's manifest.yaml
      is listed with its name, description, required/optional status, and whether
      it is currently set or missing.

      Admins can save or remove secrets directly from this page — no need to
      navigate to the standalone Credentials page or manually type capability IDs.

      For capability developers: the manifest.yaml `credentials[]` entries now
      support an optional `description` field (string) that is displayed to the
      user alongside the secret input. Authors should add human-readable
      descriptions explaining what the credential is for and where to obtain it.

      Example manifest.yaml:
        credentials:
          - name: SERPAPI_API_KEY
            scope: system
            required: false
            description: >
              API key for SerpAPI (https://serpapi.com). Enables reliable
              web search. Optional — falls back to browser search if absent.

  - id: 2026-03-03-agent-persistent-storage
    date: "2026-03-03"
    pr:
    area: agents
    type: added
    audience: both
    summary: "Agents can now persistently store key-value data via built-in store_* tools"
    affected_files:
      - crates/selu-orchestrator/migrations/0018_agent_storage.sql
      - crates/selu-orchestrator/src/agents/storage.rs
      - crates/selu-orchestrator/src/agents/mod.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/agents/bundled.rs
      - crates/selu-orchestrator/src/agents/marketplace.rs
      - crates/selu-orchestrator/src/permissions/tool_policy.rs
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/templates/agents_detail.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - developer-guide/built-in-tools
      - developer-guide/agent-format/agent-yaml
      - user-guide/agents
    details: |
      Four new built-in tools are now available to all agents:

      - store_get(key) — retrieve a stored value by key
      - store_set(key, value) — persistently store a key-value pair
      - store_delete(key) — delete a stored key
      - store_list() — list all stored key-value pairs

      Storage is scoped per agent + per user — each user's agent state
      is fully isolated. Data survives container restarts, session resets,
      and orchestrator reboots (stored in SQLite).

      These tools follow the same pattern as emit_event and
      delegate_to_agent: they are handled by the orchestrator, not by
      capability containers, and are subject to tool policy (default: Allow).

      The agent detail page now shows these tools in the built-in tools
      policy section with both English and German translations.

      Agent developers can instruct their agents to use store_* tools
      in their agent.md or capability prompt.md for maintaining state
      like sync checkpoints, user preferences, or bookmarks.

      On agent uninstall, all stored data for that agent is cleaned up.

  - id: 2026-03-03-egress-proxy-wildcard-hosts
    date: "2026-03-03"
    pr:
    area: capabilities
    type: added
    audience: developers
    summary: "Egress proxy allowlists now support wildcard suffix matching (*.domain.com)"
    affected_files:
      - crates/selu-orchestrator/src/capabilities/egress_proxy.rs
    docs_sections:
      - developer-guide/capabilities/container-guidelines
      - reference/manifest-yaml-schema
    details: |
      The egress proxy's allowlist matching now supports wildcard entries
      prefixed with "*." to match any subdomain.

      Examples:
        - "*.icloud.com:443" matches p42-caldav.icloud.com:443
        - "*.example.com" matches sub.example.com on any port
        - "*.example.com" does NOT match example.com itself (only subdomains)

      This is useful for services like iCloud CalDAV that redirect to
      numbered subdomains (p01-caldav.icloud.com, p42-caldav.icloud.com).

      Manifest.yaml example:
        network:
          mode: allowlist
          hosts:
            - "api.example.com:443"
            - "*.cdn.example.com:443"

  - id: 2026-03-03-schedules
    date: "2026-03-03"
    pr:
    area: ui
    type: added
    audience: users
    summary: "Recurring schedules allow users to automate agent tasks on a cron-based timing"
    affected_files:
      - crates/selu-orchestrator/migrations/0019_schedules.sql
      - crates/selu-orchestrator/src/schedules/mod.rs
      - crates/selu-orchestrator/src/schedules/nl_to_cron.rs
      - crates/selu-orchestrator/src/schedules/executor.rs
      - crates/selu-orchestrator/src/commands/mod.rs
      - crates/selu-orchestrator/src/commands/schedule.rs
      - crates/selu-orchestrator/src/web/schedules.rs
      - crates/selu-orchestrator/src/web/chat.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/src/main.rs
      - crates/selu-orchestrator/templates/schedules.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/agents
      - user-guide/channels/web-chat
    details: |
      Users can now create recurring schedules that run agent prompts
      automatically. Schedules are created via:

      1. The new /schedules web page (accessible to all users via sidebar)
      2. Chat slash commands: /schedule add, /schedule list, /schedule delete

      Key features:
      - Natural language timing (e.g. "every weekday at 6:45 AM") is parsed
        by the LLM into cron expressions
      - Each schedule can fire on one or more pipes; results appear as new
        conversation threads in Chat
      - Per-user timezone support (configurable on the Schedules page)
      - Toggle schedules on/off, delete them
      - Background executor checks for due schedules every 30 seconds

      This also introduces the slash command system to Selu. Messages starting
      with "/" are intercepted before the agent engine and handled as commands.
      Currently supported: /schedule add, /schedule list, /schedule delete.

      New database tables: schedules, schedule_pipes.
      New column on users: timezone (TEXT, default 'UTC').

  - id: 2026-03-03-slash-commands
    date: "2026-03-03"
    pr:
    area: ui
    type: added
    audience: both
    summary: "Slash command system for chat (/schedule add, /schedule list, /schedule delete)"
    affected_files:
      - crates/selu-orchestrator/src/commands/mod.rs
      - crates/selu-orchestrator/src/commands/schedule.rs
      - crates/selu-orchestrator/src/web/chat.rs
    docs_sections:
      - user-guide/channels/web-chat
    details: |
      A new extensible slash command system intercepts messages starting
      with "/" in web chat before they reach the agent engine. Commands
      are handled synchronously (no SSE streaming) and the response is
      rendered as a static assistant message.

      Currently available commands:
      - /schedule add <prompt + timing> - create a recurring schedule
      - /schedule list - list your schedules
      - /schedule delete <name> - delete a schedule by name

      The command system is designed for easy extension: adding new
      commands only requires a new module and a match arm in the
      dispatcher. Other channels (Telegram, iMessage) can integrate
      the same command dispatcher in future.

  - id: 2026-03-03-one-shot-reminders
    date: "2026-03-03"
    pr:
    area: agents
    type: added
    audience: both
    summary: "One-shot reminders via /remind command, set_reminder built-in tool, and unified NL schedule parser"
    affected_files:
      - crates/selu-orchestrator/migrations/0020_one_shot_schedules.sql
      - crates/selu-orchestrator/src/schedules/mod.rs
      - crates/selu-orchestrator/src/schedules/nl_to_cron.rs
      - crates/selu-orchestrator/src/schedules/executor.rs
      - crates/selu-orchestrator/src/commands/mod.rs
      - crates/selu-orchestrator/src/commands/remind.rs
      - crates/selu-orchestrator/src/commands/schedule.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/agents/context.rs
      - crates/selu-orchestrator/src/permissions/tool_policy.rs
      - crates/selu-orchestrator/src/web/schedules.rs
      - crates/selu-orchestrator/src/i18n.rs
      - crates/selu-orchestrator/templates/schedules.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/agents
      - user-guide/channels/web-chat
      - developer-guide/built-in-tools
    details: |
      Users can now create one-shot reminders that fire once at a specific
      future time, complementing the existing recurring cron schedules.

      Three entry points:

      1. `/remind <what + when>` slash command in chat
         (e.g. `/remind Check the weather and email about grilling next Sunday morning`)
      2. `set_reminder` built-in tool — agents can call this directly during
         conversation when the user asks to be reminded of something. The LLM
         prefers this over telling the user to use the /remind command.
      3. The existing `/schedule add` command and web UI form now auto-detect
         one-shot vs. recurring timing — users don't need to know the difference.

      The NL parser (LLM-based) now distinguishes between recurring timing
      ("every weekday at 8am") and one-shot timing ("next Sunday at 10am",
      "in 20 minutes", "tomorrow at 3pm") and creates the appropriate type.

      When a one-shot reminder fires, the executor runs the prompt as a new
      agent turn on the assigned pipes — the agent can use any of its tools
      (check weather, send emails, etc.) to complete the task.

      Fired reminders are automatically cleaned up after 7 days.

      The Schedules web page shows one-shot reminders with a "Fires once"
      badge and a "Completed" status after they fire.

      New database column: schedules.one_shot (INTEGER, default 0).
      New built-in tool: set_reminder (subject to tool policy, default: Allow).
      New slash command: /remind.
      All UI strings available in English and German.

  - id: 2026-03-04-dynamic-capability-tools
    date: "2026-03-04"
    pr:
    area: capabilities
    type: added
    audience: developers
    summary: "Capabilities can opt into dynamic tool discovery and automatic policy reconciliation"
    affected_files:
      - crates/selu-orchestrator/src/capabilities/manifest.rs
      - crates/selu-orchestrator/src/capabilities/discovery.rs
      - crates/selu-orchestrator/src/capabilities/mod.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/agents/marketplace.rs
      - crates/selu-orchestrator/src/main.rs
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/templates/agents_setup.html
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/migrations/0021_dynamic_tool_discovery.sql
    docs_sections:
      - developer-guide/capabilities/manifest-yaml
      - developer-guide/capabilities/grpc-interface
      - developer-guide/capabilities/container-guidelines
      - reference/manifest-yaml-schema
    details: |
      Added an opt-in dynamic tool mode per capability via manifest fields:
      `tool_source: dynamic` and optional `discovery_tool_name` (default:
      `list_tools`). Dynamic capabilities must not statically declare `tools`.

      Selu now invokes the discovery tool directly on capability containers,
      stores discovered tool metadata in `discovered_tools`, and tracks sync
      status in `tool_discovery_state`.

      Sync runs in three lifecycle points:
      - startup (best-effort background sync for loaded agents)
      - install/update flows
      - setup flow

      Reconciliation behavior:
      - added tools are upserted and get global default policies using
        discovered `recommended_policy` or secure fallback `block`
      - removed tools are hard-deleted from discovered metadata, global
        policies, and per-user policy overrides
      - failed discovery keeps prior discovered tool state unchanged and
        records an error in `tool_discovery_state`

      Runtime tool exposure now hydrates dynamic capability tools from the
      discovered cache, so LLM tool specs and invocation resolution reflect
      the latest synced tool set instead of static manifest declarations.

  - id: 2026-03-04-approval-prompt-copy
    date: "2026-03-04"
    pr:
    area: channels
    type: changed
    audience: users
    summary: "Non-interactive approval prompts now use friendlier, less technical wording"
    affected_files:
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/agents/context.rs
      - crates/selu-orchestrator/src/i18n.rs
    docs_sections:
      - user-guide/security/tool-policies
      - user-guide/channels/imessage
    details: |
      Approval prompts sent via non-interactive threaded channels (such as
      iMessage and webhook-based channels) were rewritten to be easier for
      non-technical users to understand.

      The prompt format now:
      - starts with a short confirmation request ("Before I continue...")
      - shows a humanized action label derived from the tool name
      - presents up to three arguments using humanized field names and
        simplified values (arrays of strings are displayed as plain lists)
      - ends with a plain-language reply instruction

      Server-side i18n entries for both English and German were updated for
      this flow.

      Hybrid approval copy support was added: the LLM can include an optional
      `_approval_message` field in tool arguments, and Selu will use it as the
      headline text in the approval request. This field is internal-only and
      is stripped before actual tool invocation.

