      - crates/selu-orchestrator/templates/system_updates.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/self-hosting/updating
      - user-guide/self-hosting/environment-variables
      - reference/environment-variables
    details: |
      Added a new System Updates section in the orchestrator UI for administrators:
      - Choose release channel: stable (default), dev, nightly
      - Trigger "Check now" against release metadata
      - Trigger "Update now" to apply a server update via Docker Compose
      - Trigger one-click rollback to the previously installed version
      - Toggle auto-update preference

      New configuration keys:
      - `SELU__RELEASE_METADATA_URL` (default: https://selu.bot/api/releases/selu)
      - `SELU__COMPOSE_FILE` (default: ./docker-compose.yml)
      - `SELU__COMPOSE_SERVICE` (default: selu)
      - `SELU__COMPOSE_ENV_FILE` (default: ./.env)
      - `SELU__UPDATER_MODE` (`in_process` or `sidecar`, default: `sidecar`)
      - `SELU__UPDATER_URL` (default: http://selu-updater:8090)
      - `SELU__UPDATER_SHARED_SECRET` (optional shared secret header)
      - `SELU__UPDATER_REQUEST_TIMEOUT_SECS` (default: 30)

      New persistence tables track update settings and server update state,
      including updater status/progress keys, update attempt timestamps, and
      previous image references for rollback, plus explicit update jobs.
      Background checks run daily when auto-check is enabled, and auto-apply
      runs automatically when auto-update is enabled and a newer digest exists.

  - id: 2026-03-17-system-updates-version-build-changelog
