      The WhatsApp setup wizard no longer asks users to provide a bridge URL.
      Selu now treats the bridge as a managed sidecar and writes the outbound
      callback URL automatically.

      Selu currently enforces one active WhatsApp pipe per instance. The setup
      page and the "Add new pipe" card now reflect this limitation in the UI.

      The WhatsApp detail page now shows bridge/session pairing state and QR
      code availability for phone linking when required.

      The updater sidecar now exposes additional WhatsApp bridge lifecycle
      endpoints: status inspection and stop. Selu calls stop automatically when
      the last active WhatsApp pipe is removed (and on startup if no active
      WhatsApp pipe exists).
