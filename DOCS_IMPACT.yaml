    docs_sections:
      - user-guide/channels/web-chat
      - user-guide/self-hosting/docker
      - reference/api
    details: |
      Web chat thread artifacts (user-uploaded images and agent-generated
      artifact files) are now persisted to the Selu data filesystem and indexed
      in a new `thread_artifacts` table.

      Artifact downloads now fall back to persisted thread storage when an
      artifact is no longer in the in-memory store, preventing broken image
      previews after page reload or process restart.

      Deleting a web chat thread now deletes associated `thread_artifacts`
      database rows and removes persisted files from disk.
  - id: 2026-03-29-image-model-routing-and-settings
    date: "2026-03-29"
    pr:
    area: agents
    type: changed
    audience: both
    summary: "Selu now supports optional image-model configuration and channel-agnostic image intent routing for generate/edit flows"
    affected_files:
      - crates/selu-orchestrator/migrations/0043_image_model_config.sql
      - crates/selu-orchestrator/src/agents/model.rs
      - crates/selu-orchestrator/src/agents/image_intent.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/llm/image_provider.rs
      - crates/selu-orchestrator/src/llm/registry.rs
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/templates/agents.html
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/src/i18n.rs
    docs_sections:
      - user-guide/agents/sessions
      - user-guide/channels/web-chat
      - user-guide/channels/imessage
      - user-guide/channels/telegram
      - user-guide/llm-providers/openai
      - reference/env-vars
    details: |
      Image generation and image editing are now routed by a channel-agnostic
      resolver in the agent turn engine instead of web-only UI actions. Selu
      detects explicit commands (`/image`, `/edit`) and conservative natural
      language signals, then runs image generation/editing when configured.

      Image-model selection is now optional and separate from text-model
      selection:
      - Global default image model in the Agents settings page
      - Per-agent optional image model override
      - Graceful localized fallback when image model is not configured

      Backend image execution now uses a dedicated image provider abstraction
      (`llm/image_provider.rs`) with an OpenAI-compatible implementation for
      generate/edit API calls. Generated/edited images are persisted as Selu
      artifacts and returned through standard turn attachments, preserving
      cross-channel behavior.
  - id: 2026-03-29-whatsapp-outbound-image-delivery
    date: "2026-03-29"
    pr:
    area: channels
    type: changed
    audience: both
    summary: "WhatsApp bridge outbound webhooks now deliver image attachments as native WhatsApp images, not only PDFs/documents"
    affected_files:
      - sidecars/whatsapp-bridge/src/index.js
      - sidecars/whatsapp-bridge/README.md
    docs_sections:
      - user-guide/channels/telegram
      - user-guide/channels/imessage
      - user-guide/channels/web-chat
    details: |
      The WhatsApp bridge outbound webhook handler now supports image
      attachments (`mime_type` starting with `image/`) in addition to
      PDF/document attachments.

      Behavior:
      - `image/*` attachments are sent via WhatsApp `image` messages.
      - Non-image attachments continue to be sent as documents.
      - Both inline `data_base64` payloads and remote `download_url` payloads
        are supported for attachments.

      This aligns WhatsApp outbound media behavior with BlueBubbles and Telegram
      attachment handling in Selu.
  - id: 2026-03-30-cross-session-capability-sharing
    date: "2026-03-30"
    pr:
    area: capabilities
    type: added
    audience: developers
    summary: "Capability manifests can now opt into cross-session container reuse with configurable concurrency limits"
    affected_files:
      - crates/selu-orchestrator/src/capabilities/manifest.rs
      - crates/selu-orchestrator/src/capabilities/mod.rs
      - crates/selu-orchestrator/src/capabilities/runner.rs
      - crates/selu-orchestrator/src/main.rs
    docs_sections:
      - developer-guide/capabilities/container-guidelines
      - developer-guide/capabilities/manifests
      - reference/manifest-yaml-schema
    details: |
      Capability manifests now support an optional `sharing` block:

        sharing:
          mode: shared          # or "exclusive" (default)
          max_concurrent: 4     # max parallel gRPC invocations (default: 1)
          idle_timeout_seconds: 300  # stop after N seconds idle (default: 300)

      When `mode: shared`, a single container is reused across all sessions
      instead of spawning one per session. This reduces resource usage for
      stateless Tool-class capabilities like weather lookups or PDF generation.

      Safety constraints:
      - Only `class: tool` capabilities can opt in (environment class rejected)
      - `filesystem: workspace` is rejected (workspace volumes are per-session)
      - Shared containers omit SELU_SESSION_ID env var (session_id is still
        passed per-request in gRPC InvokeRequest)
      - Per-user network policy overrides do not apply to shared containers
        (the manifest's declared policy is used directly)
      - Concurrency is bounded by a tokio::sync::Semaphore per capability
      - A background reaper stops idle shared containers after their timeout

      Credentials remain safe: they are resolved per-user per-invoke and
      passed in gRPC config_json, never as container environment variables.

  - id: 2026-03-31-unified-memory
    date: 2026-03-31
    pr:
    area: agents
    type: changed
    audience: both
    summary: "Unified memory: personality and agent memory merged into one shared, BM25-searchable memory pool"
    affected_files:
      - crates/selu-orchestrator/src/agents/memory.rs
      - crates/selu-orchestrator/src/agents/personality.rs
      - crates/selu-orchestrator/src/agents/context.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/web/personality.rs
      - crates/selu-orchestrator/migrations/0048_unified_memory.sql
      - crates/selu-orchestrator/templates/personality.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/personality
      - developer-guide/built-in-tools/*
    details: |
      The separate "Personality" (auto-extracted user facts) and "Memory"
      (per-agent BM25 notes) systems have been merged into a single unified
      memory pool stored in the agent_memories table.

      Key changes for users:
      - The "Personality" page in the web UI is now called "Memory".
      - All facts are shared across all agents — anything one agent learns
        about you is available to every other agent.
      - The system still auto-extracts facts from conversations (previously
        called "personality extraction"), and agents can still save notes
        via the memory_remember tool.
      - Three source types are shown: "Learned from conversation" (auto),
        "Saved by agent" (agent tool call), "Added manually" (web UI).

      Key changes for agent developers:
      - The memory_* tools (memory_remember, memory_forget, memory_search,
        memory_list) now operate on a user-scoped pool, not per-agent.
        Memories written by one agent are visible to all agents for that user.
      - The store_* tools remain agent-scoped (private per agent+user) and
        are unchanged. Use store for workflow state; use memory for user
        knowledge.
      - No changes needed to agent.yaml or capability manifests.

      Migration: existing personality facts are automatically copied into
      the unified memory table on first start (migration 0048). The old
      user_personality table is preserved but no longer read by the system.
  - id: 2026-03-31-delegation-progress-heartbeat
    date: "2026-03-31"
    pr:
    area: agents
    type: changed
    audience: users
    summary: "Long delegated runs now emit periodic progress updates instead of appearing stalled"
    affected_files:
