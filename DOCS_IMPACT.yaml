      Added/used new env vars during apply/rollback:
      - `SELU_IMAGE_VERSION`
      - `SELU_IMAGE_BUILD`

      Sidecar updater request/status payloads now also carry release version/build metadata so UI state remains consistent during sidecar-managed updates.
  - id: 2026-03-18-users-agent-access-persistence
    date: "2026-03-18"
