      - crates/selu-orchestrator/templates/pipes_whatsapp_setup.html
      - crates/selu-orchestrator/templates/pipes_whatsapp_detail.html
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/migrations/0032_whatsapp_configs.sql
      - crates/selu-updater/src/api.rs
      - crates/selu-updater/src/engine.rs
      - crates/selu-updater/src/config.rs
      - crates/selu-updater/src/types.rs
      - sidecars/whatsapp-bridge/Dockerfile
      - sidecars/whatsapp-bridge/package.json
      - sidecars/whatsapp-bridge/src/index.js
      - .env.example
    docs_sections:
      - user-guide/channels/telegram
      - user-guide/self-hosting/docker
      - user-guide/agents/sessions
    details: |
      Selu now supports WhatsApp as a first-class pipe type in the admin UI,
      implemented as a guided setup flow for Baileys-based bridges.

      The wizard creates both a `pipes` row (webhook transport) and a new
      `whatsapp_configs` row, stores the bridge outbound URL plus optional auth
      header, and supports optional sender-to-user mapping.

      A dedicated detail page now shows the Selu inbound URL and bearer token
      to configure on the bridge, plus allowed-sender management and safe
      deactivation for WhatsApp pipes.

      Setup now also calls the updater sidecar to transparently pull and launch
      the `selu-whatsapp-bridge` container directly (on-demand) before creating
      the pipe, so users do not need to predefine a WhatsApp service in compose.

      On Selu startup, if an active WhatsApp pipe exists, Selu re-runs the
      sidecar ensure flow so the bridge is available after restarts.

      The updater sidecar now exposes a WhatsApp-bridge ensure endpoint that
      performs Docker `pull` + `run` with persisted bridge auth state and
      injected Selu inbound URL/token env vars.
  - id: 2026-03-20-whatsapp-managed-bridge-lifecycle
    date: "2026-03-20"
    pr:
    area: channels
    type: changed
    audience: both
    summary: "WhatsApp now uses a managed bridge UX with single-pipe enforcement and bridge status/lifecycle controls"
    affected_files:
