      - user-guide/self-hosting/docker
    details: |
      When the last active WhatsApp pipe is removed, Selu still stops the
      managed bridge container, but now it also deletes the persisted Baileys
      auth directory inside the bridge data volume.

      Recreating a WhatsApp pipe after deletion now requires pairing the phone
      again, rather than reusing the previous bridge login session.
  - id: 2026-03-25-pipe-creation-wizard
    date: "2026-03-25"
    pr:
    area: channels
    type: changed
    audience: users
    summary: "Pipe creation now starts from a separate wizard-style selection screen"
    affected_files:
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/src/web/pipes.rs
      - crates/selu-orchestrator/templates/pipes.html
      - crates/selu-orchestrator/templates/pipes_new.html
      - crates/selu-orchestrator/templates/pipes_web_new.html
      - crates/selu-orchestrator/templates/pipes_webhook_new.html
      - crates/selu-orchestrator/templates/pipes_imessage_setup.html
      - crates/selu-orchestrator/templates/pipes_telegram_setup.html
      - crates/selu-orchestrator/templates/pipes_whatsapp_setup.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/channels/web-chat
      - user-guide/channels/telegram
      - getting-started/first-conversation
    details: |
      The Pipes index is now focused on managing existing pipes. Creating a new
      pipe starts from a dedicated "Add Pipe" screen that mirrors the provider
      setup flow: choose a pipe type first, then continue into the matching
      setup wizard.

      Pipe-specific setup pages now link back to the new selection step instead
      of directly back to the Pipes index, so the flow behaves like a guided
      two-step wizard.

      The refactor also updates several pipe setup pages to use translation keys
      for user-facing labels, hints, and button text that were previously
      hardcoded.
  - id: 2026-03-25-whatsapp-requires-allowed-chat
    date: "2026-03-25"
    pr:
    area: channels
    type: changed
    audience: users
    summary: "WhatsApp pipes now stay silent until at least one allowed chat is added"
    affected_files:
      - crates/selu-orchestrator/src/pipes/inbound.rs
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/templates/pipes_whatsapp_detail.html
    docs_sections:
      - user-guide/channels/telegram
    details: |
      Selu no longer falls back to the pipe owner for WhatsApp messages when a
      WhatsApp pipe has no `user_sender_refs` entries yet.

      A newly paired WhatsApp pipe now ignores inbound messages until the admin
      explicitly adds at least one allowed chat on the WhatsApp pipe detail
      page. This closes a security gap where a fresh pipe could briefly answer
      any forwarded WhatsApp sender before chat restrictions were configured.
  - id: 2026-03-25-all-pipes-require-allowed-sender
    date: "2026-03-25"
    pr:
    area: channels
    type: changed
    audience: users
    summary: "All pipes now ignore unknown senders until a sender mapping is configured"
    affected_files:
      - crates/selu-orchestrator/src/pipes/inbound.rs
      - crates/selu-orchestrator/src/telegram/adapter.rs
      - crates/selu-orchestrator/src/bluebubbles/adapter.rs
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/templates/pipes_imessage_detail.html
      - crates/selu-orchestrator/templates/pipes_telegram_detail.html
      - crates/selu-orchestrator/templates/pipes_whatsapp_detail.html
    docs_sections:
      - user-guide/channels/telegram
      - user-guide/channels/web-chat
    details: |
      Selu no longer falls back to the pipe owner when an inbound message
      arrives from an unknown sender on any pipe type.

      Messages from unknown iMessage, Telegram, WhatsApp, and generic webhook
      senders are now ignored until the admin explicitly adds matching
      `user_sender_refs` entries for that pipe.

      Pipe setup and detail pages were updated to explain that an empty allowed
      sender list means "reply to nobody yet", not "reply to everyone".
- id: 2026-03-25-whatsapp-self-chat-support
  date: "2026-03-25"
  pr:
  area: channels
  type: changed
  audience: users
  summary: "WhatsApp pipes now support chatting with your own WhatsApp account"
  affected_files:
    - sidecars/whatsapp-bridge/src/index.js
    - sidecars/whatsapp-bridge/README.md
  docs_sections:
    - user-guide/channels/telegram
  details: |
    The WhatsApp bridge now treats WhatsApp's self-chat identity aliases as the
    same account when deciding whether an inbound `fromMe` event should be
    forwarded to Selu.

    This allows people who message themselves in WhatsApp to use that chat with
    Selu, even when WhatsApp reports the self-chat as a local identity (`@lid`)
    instead of the phone JID used elsewhere.
- id: 2026-03-25-whatsapp-self-chat-whole-thread
  date: "2026-03-25"
  pr:
  area: channels
  type: changed
  audience: users
  summary: "WhatsApp self-chat now treats the whole conversation as one thread"
  affected_files:
    - sidecars/whatsapp-bridge/src/index.js
    - crates/selu-orchestrator/src/pipes/inbound.rs
  docs_sections:
    - user-guide/channels/telegram
  details: |
    When Selu is used through WhatsApp self-messaging, inbound messages are now
    marked to use whole-chat thread routing instead of per-message reply
    routing.

    This avoids WhatsApp self-chat reply metadata edge cases by treating the
    conversation like one ongoing chat thread. The tradeoff is that self-chat
    replies are no longer tied to a specific WhatsApp message bubble.
- id: 2026-03-27-admin-password-reset-command
  date: "2026-03-27"
  pr:
  area: security
  type: added
  audience: developers
  summary: "Added an admin CLI command to securely reset a user's web password"
  affected_files:
    - crates/selu-orchestrator/src/admin.rs
    - crates/selu-orchestrator/src/main.rs
  docs_sections:
    - user-guide/self-hosting/updating
    - reference/env-vars
  details: |
    The orchestrator binary now supports an administrative command:

      selu-orchestrator reset-password --username <username> --password-stdin

    The command reads the new password from stdin, hashes it with Argon2id,
    updates the selected user's `password_hash`, and revokes all active
    `web_sessions` for that user in the same transaction.

    This provides a secure recovery path when an admin forgets a user's
    password without introducing a web-based reset endpoint.
- id: 2026-03-27-self-service-password-change
  date: "2026-03-27"
  pr:
  area: security
  type: added
  audience: users
  summary: "Logged-in users can now change their own password from the Users screen"
  affected_files:
    - crates/selu-orchestrator/src/web/users.rs
    - crates/selu-orchestrator/src/web/mod.rs
    - crates/selu-orchestrator/templates/users.html
    - crates/selu-orchestrator/templates/layout.html
  docs_sections:
    - user-guide/security/credentials
    - user-guide/self-hosting/updating
  details: |
    Added a self-service password change flow on `/users` for all authenticated users.
    The form is opened from a "Change password" button in a modal, keeping the
    page focused on the main user list.
    The flow requires the current password, enforces a minimum length for the new
    password, confirms the new password, and updates the stored Argon2id hash.

    After a successful password change, Selu revokes other active web sessions
    for that account to reduce account takeover risk while keeping the current
    session active.

    The Users page navigation is now visible to non-admin users so they can
    reach their account password settings.
- id: 2026-03-27-artifact-handoff-for-attachments
  date: "2026-03-27"
  pr:
  area: agents
  type: added
  audience: developers
  summary: "Capabilities can now return artifact payloads that become attachment references across tools in the same session"
  affected_files:
    - crates/selu-orchestrator/src/agents/artifacts.rs
    - crates/selu-orchestrator/src/agents/engine.rs
    - crates/selu-orchestrator/src/state.rs
  docs_sections:
    - developer-guide/capabilities/container-guidelines
    - developer-guide/agent-format/package-structure
    - reference/manifest-yaml-schema
  details: |
    Added orchestrator-level artifact handoff support for capability tool flows.
    A capability tool can now return JSON with an `artifact` (or `artifacts`)
    object that includes `filename`, `mime_type`, and `data_base64`.

    Selu stores the payload in session-scoped in-memory storage and rewrites
    tool output to a compact `artifact_id` reference. Later tool calls in the
    same user session can pass `attachments[].artifact_id`, and Selu resolves
    it back into `data_base64` right before invoking the target capability.

    Security constraints:
    - artifacts are scoped to `(user_id, session_id)`
    - artifacts expire automatically (TTL)
    - payload size is validated with an upper bound
- id: 2026-03-27-grpc-artifact-streaming
  date: "2026-03-27"
  pr:
  area: capabilities
  type: changed
  audience: developers
  summary: "Capability artifact exchange now uses artifact IDs and gRPC upload/download streams instead of inline base64 payloads"
  affected_files:
    - crates/selu-orchestrator/proto/capability.proto
    - crates/selu-orchestrator/src/capabilities/grpc.rs
    - crates/selu-orchestrator/src/capabilities/mod.rs
    - crates/selu-orchestrator/src/agents/artifacts.rs
    - crates/selu-orchestrator/src/agents/engine.rs
    - crates/selu-orchestrator/src/llm/tool_loop.rs
  docs_sections:
    - developer-guide/capabilities/container-guidelines
    - user-guide/agents/sessions
    - reference/manifest-yaml-schema
  details: |
    Orchestrator-to-capability artifact transfer now uses dedicated gRPC RPCs:
    `UploadInputArtifact` and `DownloadOutputArtifact`.

    Capabilities that produce artifacts should return metadata with a
    `capability_artifact_id` in tool results. Orchestrator fetches bytes using
    `DownloadOutputArtifact`, stores them as session-scoped artifacts, and
    surfaces `artifact_id` to later tool calls.

    Capabilities that consume attachments receive files through
    `UploadInputArtifact`; tool arguments now carry references (`artifact_id`
    from the model, translated to `capability_artifact_id` for the capability)
    rather than inline `data_base64`.

    Inline artifact payloads in tool args/results are rejected. This reduces
    sensitive payload exposure in logs and approval records.
- id: 2026-03-27-pipe-pdf-outbound-delivery
  date: "2026-03-27"
  pr:
  area: channels
  type: changed
  audience: both
  summary: "Generated artifacts (including PDFs) can now be delivered as outbound pipe attachments with signed download links"
  affected_files:
    - crates/selu-core/src/types.rs
    - crates/selu-orchestrator/src/agents/engine.rs
    - crates/selu-orchestrator/src/agents/artifacts.rs
    - crates/selu-orchestrator/src/api/mod.rs
    - crates/selu-orchestrator/src/api/artifacts.rs
    - crates/selu-orchestrator/src/pipes/inbound.rs
    - crates/selu-orchestrator/src/channels/registry.rs
    - crates/selu-orchestrator/src/channels/webhook_sender.rs
    - crates/selu-orchestrator/src/telegram/adapter.rs
    - crates/selu-orchestrator/src/bluebubbles/adapter.rs
    - crates/selu-orchestrator/src/schedules/executor.rs
    - sidecars/whatsapp-bridge/src/index.js
  docs_sections:
    - user-guide/channels/telegram
    - user-guide/channels/web-chat
    - reference/api
  details: |
    Outbound delivery now supports structured attachments in addition to text.

    `run_turn` returns both assistant text and newly generated session
    artifacts. Pipe/channel delivery paths convert those artifacts into outbound
    attachments and include:
    - attachment metadata (artifact_id, filename, mime_type, size_bytes)
    - optional inline `data_base64` for webhook adapters
    - short-lived signed `download_url` values

    A new public endpoint serves signed artifact downloads:
    `GET /api/artifacts/{artifact_id}/download?exp=...&sig=...`.

    Telegram now sends PDF attachments with `sendDocument`.
    BlueBubbles keeps text delivery and appends signed download links.
    WhatsApp bridge outbound webhook handling now accepts `attachments` and
    sends PDF documents (URL- or base64-backed) when provided.

  - id: 2026-03-27-system-updates-modal-self-restart
    date: "2026-03-27"
    pr:
    area: updates
    type: changed
    audience: both
    summary: "System Updates now runs update/rollback from a modal with live progress and the updater sidecar replaces itself cleanly"
    affected_files:
      - crates/selu-updater/src/engine.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/src/web/system_updates.rs
      - crates/selu-orchestrator/templates/system_updates.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/self-hosting/updating
      - user-guide/self-hosting/docker
    details: |
      The updater sidecar self-refresh flow now stops and removes the running
      updater container before recreating it, instead of trying to bring up the
      replacement while the old container still owns the published port. This
      avoids duplicate updater instances and port-bind failures during Selu
      self-updates.

      The System Updates page now starts update and rollback work via
      background JSON actions instead of redirecting away immediately. The UI
      shows a modal with staged progress, keeps polling while Selu restarts,
      and reloads the page automatically when the refreshed server is back so
      people see the successful update state without manually refreshing.  - id: 2026-03-27-agent-update-wizard
    date: "2026-03-27"
    pr:
    area: ui
    type: changed
    audience: users
    summary: "Agent updates now use a guided wizard and only ask for follow-up setup when the new version truly needs new permissions or credentials"
    affected_files:
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/src/agents/marketplace.rs
      - crates/selu-orchestrator/templates/agents.html
      - crates/selu-orchestrator/templates/agents_setup.html
      - crates/selu-orchestrator/templates/agents_update.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/agents
    details: |
      The web UI agent update flow is now wizard-based instead of a background
      update banner on the Agents list.

      Behavior changes:
      - Choosing "Update" opens a dedicated update page with clear review,
        progress, and finish steps.
      - When the update completes and additional review is needed, Selu now
        takes the user directly into the final setup step of the same flow.
      - Existing global tool policies and stored system credentials are now
        reused when deciding whether post-update setup is needed.
      - Agents are no longer sent through an unnecessary extra setup step
        after an update just because they already have tools.

  - id: 2026-03-27-chat-sidebar-last-activity
    date: "2026-03-27"
    pr:
    area: ui
    type: changed
    audience: users
    summary: "Chat sidebar now orders conversations by latest message activity and shows readable timestamps"
    affected_files:
      - crates/selu-orchestrator/src/web/chat.rs
      - crates/selu-orchestrator/templates/chat.html
    docs_sections:
      - user-guide/channels/web-chat
    details: |
      The web chat conversation list now prioritizes recent activity.

      Behavior changes:
      - Conversations are sorted by latest message timestamp (most recent first),
        with thread creation time used as fallback when no messages exist.
      - Each conversation row now shows a compact last-activity timestamp.
      - Message timestamps in the chat view are formatted in a more readable
        way and adapt to the user's language (English/German).

  - id: 2026-03-27-chat-delete-conversations
    date: "2026-03-27"
    pr:
    area: ui
    type: changed
    audience: users
    summary: "Web chat now lets users delete conversations from the sidebar"
    affected_files:
      - crates/selu-orchestrator/src/web/chat.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/templates/chat.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/channels/web-chat
    details: |
      Added a new delete action for web chat conversations (threads).
      Users can now remove a conversation directly from the chat sidebar.

      Behavior:
      - Delete is available per conversation in the sidebar.
      - A confirmation prompt is shown before deletion.
      - Deleting a conversation removes the thread and its message history,
        then returns the user to the selected pipe view.

  - id: 2026-03-27-agent-tool-loop-limit-ui
    date: "2026-03-27"
    pr:
    area: ui
    type: changed
    audience: both
    summary: "Agent detail now includes a per-user complex-task step limit (0 = no limit), with defaults raised to 32"
    affected_files:
      - crates/selu-orchestrator/templates/agents_detail.html
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/llm/tool_loop.rs
      - crates/selu-orchestrator/src/config/mod.rs
      - crates/selu-orchestrator/migrations/0034_agent_tool_loop_limits.sql
      - .env.example
    docs_sections:
      - user-guide/agents
      - user-guide/security/tool-policies
      - reference/env-vars
    details: |
      Added a new "Complex Task Steps" control on the agent detail Overview
      page that lets each user set a per-agent loop limit for tool-call turns.

      Behavior:
      - Positive values set a hard cap for tool-loop iterations per turn.
      - `0` means no iteration cap (unlimited).
      - Runtime resolution order is user override -> agent default -> app config.

      Defaults were raised to 32:
      - Agent default (`agents.max_tool_loop_iterations`) now defaults to 32.
      - App-level fallback (`SELU__MAX_TOOL_LOOP_ITERATIONS`) now defaults to 32.

  - id: 2026-03-27-tool-loop-iteration-config
    date: "2026-03-27"
    pr:
    area: llm
    type: changed
    audience: developers
    summary: "Tool-loop iteration cap is configurable via env and now defaults to 32 (was hardcoded to 8)"
    affected_files:
      - crates/selu-orchestrator/src/config/mod.rs
      - crates/selu-orchestrator/src/llm/tool_loop.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - .env.example
    docs_sections:
      - reference/env-vars
      - developer-guide/agent-format
    details: |
      Added a new configuration value `max_tool_loop_iterations` exposed as
      `SELU__MAX_TOOL_LOOP_ITERATIONS`.

      The tool loop no longer uses a hardcoded 8-iteration cap; the default is
      now 32 and can be tuned per deployment.

      This supports longer multi-step tool workflows (e.g. search, coding,
      artifact generation, delivery) while still preserving loop safeguards.

  - id: 2026-03-26-user-network-overrides
    date: "2026-03-26"
    pr:
    area: permissions
    type: changed
    audience: both
    summary: "Users can now override agent network access with allow/deny and per-host rules, including custom hosts"
    affected_files:
      - crates/selu-orchestrator/src/permissions/network_policy.rs
      - crates/selu-orchestrator/src/capabilities/mod.rs
      - crates/selu-orchestrator/src/capabilities/runner.rs
      - crates/selu-orchestrator/src/capabilities/egress_proxy.rs
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/templates/agents_detail.html
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/migrations/0033_user_network_policies.sql
    docs_sections:
      - user-guide/agents
      - user-guide/security/tool-policies
      - developer-guide/capabilities/container-guidelines
    details: |
      The Agent detail Network tab now lets each user control network behavior
      per capability with:
      - Allow/Deny access toggle (user-level override)
      - Per-host allow/deny controls for default hosts declared by the agent
      - Custom host entries (for example `pypi.org:443`) that can be added,
        toggled between allow/deny, and removed

      Runtime egress enforcement now resolves effective policy as:
      1) user capability access override
      2) user host overrides
      3) capability manifest defaults

      User policy overrides are applied in the egress proxy for tool invocations
      and take precedence over agent manifest defaults, including explicit deny
      host rules.

  - id: 2026-03-28-public-web-address-and-imessage-attachments
    date: "2026-03-28"
    pr:
    area: channels
    type: changed
    audience: both
    summary: "Admins can save Selu's public web address in the UI, and iMessage now sends real attachments before falling back to links"
    affected_files:
      - crates/selu-orchestrator/src/state.rs
      - crates/selu-orchestrator/src/web/system_updates.rs
      - crates/selu-orchestrator/templates/system_updates.html
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/src/bluebubbles/adapter.rs
      - crates/selu-orchestrator/src/pipes/inbound.rs
      - crates/selu-orchestrator/src/schedules/executor.rs
      - crates/selu-orchestrator/src/web/whatsapp.rs
      - crates/selu-orchestrator/src/web/telegram.rs
      - crates/selu-orchestrator/migrations/0035_public_origin_setting.sql
    docs_sections:
      - user-guide/self-hosting/updating
      - user-guide/channels/imessage
      - user-guide/channels/telegram
      - reference/env-vars
    details: |
      Selu now persists a global public web address in SQLite instead of relying
      only on the `SELU__EXTERNAL_URL` environment variable. Admins can edit it
      on the System Updates page and apply the current browser host with one
      click. The saved value takes effect immediately and is used for generated
      artifact links, webhook registration, and bridge callback URLs.

      BlueBubbles/iMessage outbound delivery now uploads attachment media with
      `POST /api/v1/message/attachment` when artifact bytes are available. If an
      attachment upload fails, Selu still delivers a signed download link as a
      fallback so the file is not lost.

  - id: 2026-03-28-relative-date-grounding-user-timezone
    date: "2026-03-28"
    pr:
    area: agents
    type: changed
    audience: users
    summary: "Agent prompts now include explicit today/tomorrow/yesterday anchors in the user's timezone to improve relative-date accuracy"
    affected_files:
      - crates/selu-orchestrator/src/agents/context.rs
    docs_sections:
      - user-guide/channels/imessage
      - user-guide/channels/web-chat
    details: |
      Conversation context now injects a stronger per-turn date/time block that
      is computed in the user's configured timezone (from the `users.timezone`
      setting) instead of relying on server-local time formatting only.

      The system prompt now includes:
      - current timezone
      - current local datetime (human readable + ISO 8601)
      - explicit `Today`, `Tomorrow`, and `Yesterday` dates
      - instruction to resolve relative date words from these anchors

      This improves reliability for requests like "tomorrow", especially in new
      threads and around timezone boundaries.

  - id: 2026-03-28-anonymous-installation-stats
    date: "2026-03-28"
    pr:
    area: self-hosting
    type: changed
    audience: both
    summary: "Selu can send daily anonymous installation and marketplace-agent activity heartbeats with an opt-out in System Updates"
    affected_files:
      - crates/selu-orchestrator/src/telemetry.rs
      - crates/selu-orchestrator/src/main.rs
      - crates/selu-orchestrator/src/web/system_updates.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/templates/system_updates.html
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/migrations/0036_installation_telemetry_opt_out.sql
    docs_sections:
      - user-guide/self-hosting/updating
      - user-guide/agents/installing-agents
      - reference/env-vars
    details: |
      Selu now sends an anonymous heartbeat on startup and every 24 hours to
      selu.bot. The heartbeat includes only a persistent installation ID and the
      running Selu version. For marketplace activity counts, Selu also reports
      installed marketplace agent IDs and versions.

      A new System Updates setting, "Anonymous installation statistics", lets
      admins opt out at any time. When disabled, no telemetry heartbeats are sent.

  - id: 2026-03-28-settings-page-update-simplification
    date: "2026-03-28"
    pr:
    area: self-hosting
    type: changed
    audience: users
    summary: "System Updates UI is now a simpler Settings page with one update summary card and a dedicated update modal"
    affected_files:
      - crates/selu-orchestrator/templates/system_updates.html
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/src/web/system_updates.rs
    docs_sections:
      - user-guide/self-hosting/updating
    details: |
      The admin page at `/system-updates` is now presented as Settings instead of
      System Updates. Update information is condensed into a single summary card
      that shows current version, new version, whether an update is available,
      and changes/changelog links.

      Detailed update actions (update now, rollback, status details, and last
      errors) now live behind a dedicated "Manage update" modal to reduce page
      clutter and make the main screen easier for non-technical users.

  - id: 2026-03-28-nested-delegation-second-hop
    date: "2026-03-28"
    pr:
    area: agents
    type: changed
    audience: users
    summary: "Agent workflows can now delegate through one additional specialist hop in a single request"
    affected_files:
      - crates/selu-orchestrator/src/agents/engine.rs
    docs_sections:
      - user-guide/agents/sessions-and-subscriptions
    details: |
      Selu now allows one nested delegation hop (`chain_depth <= 1`) instead of
      only allowing delegation at the top level. This enables multi-specialist
      flows like default assistant -> PDF specialist -> email specialist in one
      user request.

      Deeper delegation remains disabled to reduce risk of specialist ping-pong
      loops.

  - id: 2026-03-28-agent-autonomy-level-settings
    date: "2026-03-28"
    pr:
    area: agents
    type: changed
    audience: users
    summary: "Agent runtime control is now an autonomy-level setting with optional advanced limits for steps and specialist handoffs"
    affected_files:
      - crates/selu-orchestrator/src/agents/runtime_limits.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/web/agents.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/templates/agents_detail.html
      - crates/selu-orchestrator/templates/layout.html
      - crates/selu-orchestrator/migrations/0038_autonomy_runtime_settings.sql
    docs_sections:
      - user-guide/agents/sessions-and-subscriptions
      - user-guide/security/tool-policies
    details: |
      The agent detail page now exposes one simple "Autonomy level" control
      (low/medium/high) for normal users, plus an "Advanced" section for
      optional explicit limits.

      Runtime limits are now resolved from a shared settings model:
      - max tool steps per reply
      - max specialist delegation hops

      New database fields were added for agent defaults and per-user overrides
      in `user_agent_runtime_settings`, including a flag to enable advanced
      overrides.

  - id: 2026-03-29-autonomy-preset-rebalance
    date: "2026-03-29"
    pr:
    area: agents
    type: changed
    audience: users
    summary: "Autonomy presets were rebalanced so medium/high support longer workflows; high now has a generous 200-step cap instead of unlimited"
    affected_files:
      - crates/selu-orchestrator/src/agents/runtime_limits.rs
      - crates/selu-orchestrator/migrations/0039_autonomy_preset_rebalance.sql
    docs_sections:
      - user-guide/agents/sessions-and-subscriptions
    details: |
      Preset mappings are now:
      - low: 24 tool steps, 1 specialist handoff
      - medium: 64 tool steps, 5 specialist handoffs
      - high: 200 tool steps, 6 specialist handoffs

      All levels now have a finite iteration cap as a safety net against
      runaway cost if the LLM enters a degenerate loop pattern.

  - id: 2026-03-29-delegate-default-allow-runtime
    date: "2026-03-29"
    pr:
    area: security
    type: changed
    audience: users
    summary: "Built-in delegate_to_agent now defaults to Allow at runtime when no explicit policy exists"
    affected_files:
      - crates/selu-orchestrator/src/permissions/tool_policy.rs
      - crates/selu-orchestrator/migrations/0041_delegate_policy_default_allow_backfill.sql
    docs_sections:
      - user-guide/security/tool-policies
      - user-guide/agents/sessions-and-subscriptions
    details: |
      Effective policy resolution now includes a runtime fallback for the
      built-in `delegate_to_agent` tool. If neither a per-user override nor a
      global policy exists, delegation defaults to Allow so multi-agent
      workflows remain usable without extra setup.

  - id: 2026-03-28-grok-provider-support
    date: "2026-03-28"
    pr:
    area: llm-providers
    type: added
    audience: both
    summary: "Added xAI Grok as a configurable LLM provider in setup, provider settings, and model selection"
    affected_files:
      - crates/selu-orchestrator/src/llm/openai.rs
      - crates/selu-orchestrator/src/llm/registry.rs
      - crates/selu-orchestrator/src/llm/models.rs
