  - id: 2026-03-19-whatsapp-pipe-wizard
    date: "2026-03-19"
    pr:
    area: channels
    type: added
    audience: both
    summary: "Added a WhatsApp pipe setup wizard and management pages using a Baileys webhook bridge"
    affected_files:
      - crates/selu-orchestrator/src/web/whatsapp.rs
      - crates/selu-orchestrator/src/web/mod.rs
      - crates/selu-orchestrator/src/web/pipes.rs
