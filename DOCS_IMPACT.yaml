    details: |
      The Users admin page agent-access picker moved out of the table cell into
      a dedicated modal per user to improve usability on smaller screens and in
      dense tables.

      Saving now uses a standard POST + redirect flow from that modal with a
      single serialized `agents` field, making selection behavior deterministic
      and immediately visible after reload.

      Added a backward-compatible runtime safeguard in the users web handler to
      ensure the `user_agent_access` table exists before read/write operations.
      This avoids silent failures on older installations that have not yet run
      the migration.

      The table layout was also adjusted to reduce excessive scrolling on the
      page: the content container is wider, the table now has a stable minimum
      width, and the "Created" column is hidden on smaller screens.
  - id: 2026-03-19-agent-i18n-bundles
    date: "2026-03-19"
