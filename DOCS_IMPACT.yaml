    area: web
    type: changed
    audience: users
    summary: "Web chat image attachments now show thumbnail previews before send and can be removed individually"
    affected_files:
      - crates/selu-orchestrator/templates/chat.html
      - crates/selu-orchestrator/templates/layout.html
    docs_sections:
      - user-guide/channels/web-chat
    details: |
      The chat composer now renders thumbnail previews for selected images
      before sending. Users can remove any selected image directly from the
      preview grid before submitting the message.

      File-selection UX supports incremental multi-select and de-duplication in
      the browser, and updates localized status labels in English and German.
  - id: 2026-03-29-web-chat-thread-artifact-persistence
    date: "2026-03-29"
    pr:
    area: channels
    type: changed
    audience: both
    summary: "Web chat image artifacts are now persisted on disk per thread and cleaned up on thread deletion"
    affected_files:
      - crates/selu-orchestrator/src/agents/artifacts.rs
      - crates/selu-orchestrator/src/agents/engine.rs
      - crates/selu-orchestrator/src/api/artifacts.rs
