      - reference/manifest-yaml-schema
    details: |
      Agents can now optionally provide locale bundles under `i18n/<locale>.yaml`
      plus localized prompt files such as `agent.<locale>.md` and
      `capabilities/<capability>/prompt.<locale>.md`.

      Selu now resolves localized agent names, install-step labels and
      descriptions, automation preset labels, tool descriptions, credential
      descriptions, and approval prompt labels/messages using the user's
      language with fallback to the agent's default locale and then English.

      Marketplace payloads now also carry localized agent names and
      descriptions so the Selu admin UI and marketplace surfaces can render the
      same locale-aware copy from one source.
